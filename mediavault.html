  }
}

// ==================== TAG PICKER ====================
function renderAppliedPills(){
  const host = document.getElementById('appliedPills');
  host.innerHTML = CURRENT_APPLIED_TAGS.map(slug => {
    const t = TAGS_BY_SLUG[slug];
    const disp = t ? t.display_name : titleCase(slug);
    const prop = t && t.is_proposed ? ' proposed' : '';
    return `<span class="tagPill${prop}">${esc(disp)}<span class="x" onclick="removeAppliedTag('${esc(slug)}')">&times;</span></span>`;
  }).join('');
}
function addAppliedTag(slug){
  slug = slugify(slug);
  if(!slug) return;
  // pill-redesign 2026-05-24 §7: any code path that activates a pill counts
  // as operator interaction for the save gate.
  OPERATOR_TOUCHED_SLUGS.add(slug);
  // v0.5: use pill-state model. Exclusivity is controlled by vocab.is_exclusive (category scope).
  const t = TAGS_BY_SLUG[slug];
  if(t && t.category && t.is_exclusive){
    // pill-redesign 2026-05-24 §1+§2: clearing siblings in an exclusive
    // category sets them 'neutral' (visible-but-muted in APPLIED until
    // next open), not delete (which would vanish them mid-flow).
    for(const [s, st] of Object.entries(CURRENT_PILL_STATES)){
      if(s === slug) continue;
      const other = TAGS_BY_SLUG[s];
      if(other && other.category === t.category && st === 'on'){
        CURRENT_PILL_STATES[s] = 'neutral';
      }
    }
  }
  CURRENT_PILL_STATES[slug] = 'on';
  syncAppliedFromStates();
  CURRENT_WARNINGS = computeWarnings();
  renderPillWall();
  renderAppliedPills();
  renderTagBrowse();
}
function removeAppliedTag(slug){
  // pill-redesign 2026-05-24 §1+§2: called from the hidden tagPicker
  // X-button. Match togglePill semantics — don't delete, set 'neutral'
  // so behavior is consistent if/when this surface is ever re-enabled.
  OPERATOR_TOUCHED_SLUGS.add(slug);
  if(CURRENT_PILL_STATES[slug] === 'on'){
    CURRENT_PILL_STATES[slug] = 'neutral';
  }
  syncAppliedFromStates();
  CURRENT_WARNINGS = computeWarnings();
  renderPillWall();
  renderAppliedPills();
  renderTagBrowse();
}
function syncAppliedFromStates(){
  CURRENT_APPLIED_TAGS = Object.entries(CURRENT_PILL_STATES)
    .filter(([_, st]) => st === 'on')
    .map(([s]) => s);
}

// v0.5 — JS port of core/attention_rules.py (R1-R5). Returns warning slugs.
function computeWarnings(){
  const warnings = [];
  const platform = (document.getElementById('fSourcePlatform')?.value || '').toLowerCase();
  const postDate = document.getElementById('fPostDate')?.value || '';
  const mediaType = (document.getElementById('fMediaType')?.value || '').toLowerCase();
  const descShort = document.getElementById('fShortDesc')?.value || '';
  const descLong = document.getElementById('fLongDesc')?.value || '';
  const extracted = document.getElementById('fExtractedText')?.value || '';
  const q = (INBOX_IDX >= 0) ? QUEUE[INBOX_IDX] : null;
  const ingestSource = q ? (q.ingest_source || '') : '';
  const onSlugs = new Set(Object.entries(CURRENT_PILL_STATES)
    .filter(([_, st]) => st === 'on')
    .map(([s]) => s));
  function countInCategory(cat){
    let n = 0;
    for(const s of onSlugs){
      const v = TAGS_BY_SLUG[s];
      if(v && v.category === cat) n++;
    }
    return n;
  }
  // R1 — social-platform posts should have a post_date.
  if(SOCIAL_PLATFORMS.has(platform) && !postDate) warnings.push('missing_field:post_date');
  // R2 — top-level photo/video needs a content_kind pill.
  if((mediaType === 'photo' || mediaType === 'video') && countInCategory('content_kind') === 0){
    warnings.push('missing_category:content_kind');
  }
  // R3 — description mentions a Title-Case bigram but no people/bands pills.
  const desc = [descShort, descLong, extracted].join(' ');
  if(TITLECASE_BIGRAM.test(desc) && countInCategory('people') === 0 && countInCategory('bands') === 0){
    warnings.push('missing_category:people_or_bands');
  }
  // v0.6 Item 8c: R4 (extension captures must be scoped) removed — scope is
  // no longer a distinct category; Mike uses regular topic/content tags for
  // this instead.
  // R5 — any pill is on but media_type is empty.
  if(onSlugs.size > 0 && !mediaType) warnings.push('missing_field:media_type');
  return warnings;
}

function renderPillWall(){
  const host = document.getElementById('pillWall');
  if(!host) return;
  // v0.6 Item 8d follow-up C1: guard against the race where renderPillWall
  // is invoked before loadTags() populates TAG_LIST. If we render now, every
  // current slug will be misfiled into __uncategorized__ and the accumulated
  // view will show (0). Leave the host content alone — the next proper call
  // (after loadTags resolves) will populate it correctly.
  if(!Array.isArray(TAG_LIST) || TAG_LIST.length === 0) return;
  // Group vocab by category
  const byCat = {};
  TAG_LIST.forEach(t => {
    const cat = t.category || '__uncategorized__';
    if(!byCat[cat]) byCat[cat] = [];
    byCat[cat].push(t);
  });
  // Also include any currently-set pills not in vocab (shouldn't happen after backfill, but be safe).
  for(const slug of Object.keys(CURRENT_PILL_STATES)){
    if(!TAGS_BY_SLUG[slug]){
      const cat = '__uncategorized__';
      if(!byCat[cat]) byCat[cat] = [];
      byCat[cat].push({slug, display_name: titleCase(slug), category: null, is_proposed: 1, usage_count: 0});
    }
  }
  // Pin category order per design §4.3, then alphabetical leftovers, then __uncategorized__ last.
  const known = CATEGORY_ORDER.filter(c => byCat[c]);
  const rest = Object.keys(byCat).filter(c => !CATEGORY_ORDER.includes(c) && c !== '__uncategorized__').sort();
  const cats = [...known, ...rest];
  if(byCat['__uncategorized__']) cats.push('__uncategorized__');

  // Category-level warnings map
  const catWarnings = {};
  const fieldWarnings = [];
  for(const w of CURRENT_WARNINGS){
    if(w.startsWith('missing_category:')){
      const c = w.slice('missing_category:'.length);
      catWarnings[c === 'people_or_bands' ? 'people' : c] = w;
      if(c === 'people_or_bands') catWarnings['bands'] = w;
    } else {
      fieldWarnings.push(w);
    }
  }

  // v0.6 Item 8d follow-up C5/C6: ACCUMULATED VIEW at the top. A compact
  // strip of "what's currently applied" across every category, so Mike
  // can see at a glance which pills are on without scanning each section.
  // Updates on every renderPillWall() call (i.e. whenever a pill is
  // clicked), so it stays in sync.
  // pill-redesign 2026-05-24 §2: APPLIED shows both 'on' (active) and
  // 'neutral' (session-toggled-off-but-still-visible) entries.
  const appliedAll = TAG_LIST
    .filter(t => {
      const st = CURRENT_PILL_STATES[t.slug];
      return st === 'on' || st === 'neutral';
    })
    .sort((a, b) => (a.category||'').localeCompare(b.category||'') || a.slug.localeCompare(b.slug));
  // pill-redesign 2026-05-24 §5: spreadsheet layout for the APPLIED strip.
  // Group appliedAll by category, render one row per category (category-name
  // left col, value-pills right col). CATEGORY_ORDER pins are honoured for
  // the order; uncategorized stays last.
  let accumulatedHtml;
  if(appliedAll.length === 0){
    accumulatedHtml = '<div class="pillAccumulated empty"><span class="pillAcc-empty">(nothing applied yet)</span></div>';
  } else {
    const byCatApplied = {};
    for(const t of appliedAll){
      const cat = t.category || '__uncategorized__';
      if(!byCatApplied[cat]) byCatApplied[cat] = [];
      byCatApplied[cat].push(t);
    }
    const knownCats = CATEGORY_ORDER.filter(c => byCatApplied[c]);
    const restCats = Object.keys(byCatApplied)
      .filter(c => !CATEGORY_ORDER.includes(c) && c !== '__uncategorized__')
      .sort();
    const orderedCats = [...knownCats, ...restCats];
    if(byCatApplied['__uncategorized__']) orderedCats.push('__uncategorized__');
    const rowsHtml = orderedCats.map(cat => {
      const label = cat === '__uncategorized__' ? '(uncategorized)' : cat;
      return '<div class="pillAcc-row">'
        + `<span class="pillAcc-cat">${esc(label)}</span>`
        + `<span class="pillAcc-vals">${byCatApplied[cat].map(t => pillHtml(t)).join('')}</span>`
        + '</div>';
    }).join('');
    accumulatedHtml = `<div class="pillAccumulated">${rowsHtml}</div>`;
  }

  // Tagging Audit S1 §9.7 (2026-05-24): re-wire <details>/<summary> for
  // each .pillCategory group. Auto-collapse on any-on — the moment any
  // pill in a group is on_confident or on_uncertain, the group renders
  // closed; toggling all pills OFF re-opens it (next renderPillWall()
  // re-derives the open attr from onCount). CSS at lines 152-162 already
  // styles details/summary; this reverses V0.6 Item 8d follow-up C5/C6
  // per §9.7's friction-reducer posture.
  host.innerHTML = accumulatedHtml + cats.map(cat => {
    const label = cat === '__uncategorized__' ? 'UNCATEGORIZED' : cat.toUpperCase();
    const pills = byCat[cat].slice();
    // pill-redesign 2026-05-24 §7: collapsed rank — 'on' > 'neutral' > absent.
    // ('exclude' future-plumbed: sits between neutral and absent for now.)
    const stateRank = s => {
      const st = CURRENT_PILL_STATES[s];
      if(st === 'on') return 0;
      if(st === 'neutral') return 1;
      if(st === 'exclude') return 2;
      return 3;
    };
    pills.sort((a,b) => stateRank(a.slug) - stateRank(b.slug)
      || (b.usage_count||0) - (a.usage_count||0)
      || a.slug.localeCompare(b.slug));
    // pill-redesign 2026-05-24 §3+§8: derive both the list of 'on' pills
    // (for inline summary-header render) and the count (for the openAttr
    // gate). Only 'on' counts as "answered" — a group whose only pills are
    // 'neutral' (all toggled off this session) re-opens.
    const onPills = pills.filter(t => CURRENT_PILL_STATES[t.slug] === 'on');
    const onCount = onPills.length;
    const catWarn = catWarnings[cat] ? `<span class="catWarn" title="${esc(catWarnings[cat])}">&#9888;</span>` : '';
    const openAttr = onCount === 0 ? ' open' : '';
    // pill-redesign 2026-05-24 §3+§8: when collapsed (onCount > 0), surface
    // the selected pills inline in the summary header so the operator can
    // see the answer without expanding the group. The pills inherit the
    // Pass B 'on' aesthetic; click handlers stopPropagation so they don't
    // toggle <details> open/closed.
    const summaryValuesHtml = onCount > 0
      ? `<span class="summaryValues">${onPills.map(t => pillHtml(t)).join('')}</span>`
      : '';
    return `<details class="pillCategory"${openAttr}>
      <summary><span>${esc(label)}${catWarn}</span>${summaryValuesHtml}<span class="summaryCount">${onCount}/${pills.length}</span></summary>
      <div class="pills">${pills.map(t => pillHtml(t)).join('')}</div>
    </details>`;
  }).join('');

  // Field-level warnings: glow the relevant control
  document.querySelectorAll('.fieldGroup.warn').forEach(el => el.classList.remove('warn'));
  for(const w of fieldWarnings){
    const name = w.slice('missing_field:'.length);
    const map = {post_date: 'fPostDate', media_type: 'fMediaType'};
    const id = map[name];
    if(id){
      const el = document.getElementById(id);
      if(el){
        const grp = el.closest('.fieldGroup');
        if(grp){ grp.classList.add('warn'); grp.title = w; }
      }
    }
  }
}

// pill-redesign 2026-05-24 §4: pills inside category groups render just
// the value portion of the display_name, not the "Category:Value" prefix
// that lives in the DB. The category context is provided by the group's
// own header (renderPillWall) or by the APPLIED row's left column (Pass D).
// Defensive: if display_name is empty/null, fall back to a titleCase of
// the slug's value-suffix (the part after the first ':').
function pillDisplayValue(t){
  const dn = (t && t.display_name) || '';
  const i = dn.indexOf(':');
  if(i >= 0) return dn.slice(i + 1).trim();
  if(dn) return dn;
  const sl = (t && t.slug) || '';
  const tail = sl.includes(':') ? sl.split(':').pop() : sl;
  return titleCase(tail || '');
}

function pillHtml(t){
  // v0.6 Item 8d C4: dropped the "proposed" visual flag and tooltip suffix.
  // pill-redesign 2026-05-24 §6/§7: emit collapsed class names —
  //   .pill.on       — active
  //   .pill.neutral  — was-active-this-session, toggled off
  //   .pill.exclude  — future tri-state (no user trigger v1)
  //   (no class)     — never applied (default styling)
  const st = CURRENT_PILL_STATES[t.slug];
  let cls = 'pill';
  if(st === 'on') cls += ' on';
  else if(st === 'neutral') cls += ' neutral';
  else if(st === 'exclude') cls += ' exclude';
  const title = `${t.slug}${t.is_exclusive?' (exclusive)':''}`;
  // pill-redesign 2026-05-24 §3+§8: stopPropagation prevents summary-
   // header pill clicks from toggling the parent <details> open/closed.
  return `<span class="${cls}" onclick="event.stopPropagation();togglePill('${esc(t.slug)}')" title="${esc(title)}">${esc(pillDisplayValue(t))}<span class="cnt">${t.usage_count||0}</span></span>`;
}

function togglePill(slug){
  // pill-redesign 2026-05-24 §1+§2+§7: click changes visual state only.
  // Never delete from CURRENT_PILL_STATES mid-session — that would vanish
  // the pill from APPLIED, which is the failure mode this redesign closes.
  OPERATOR_TOUCHED_SLUGS.add(slug);
  const st = CURRENT_PILL_STATES[slug];
  if(st === 'on'){
    // Active → muted-but-visible. Stays in APPLIED (in 'neutral' visual)
    // and in its native category (also 'neutral') until next artifact open.
    CURRENT_PILL_STATES[slug] = 'neutral';
  } else if(st === 'exclude'){
    // Future tri-state plumb: exclude → neutral on click. Not user-reachable
    // in v1, but the branch lets a future control set 'exclude' explicitly
    // and have the next click neutralize it consistently.
    CURRENT_PILL_STATES[slug] = 'neutral';
  } else {
    // 'neutral' or absent → activate. addAppliedTag handles exclusive-cat.
    addAppliedTag(slug);
    return;
  }
  syncAppliedFromStates();
  CURRENT_WARNINGS = computeWarnings();
  renderPillWall();
  renderAppliedPills();
  renderTagBrowse();
}

// pillAdd input — Enter creates a proposed tag and applies it.
(function setupPillAdd(){
  const input = document.getElementById('pillAdd');
  const sug = document.getElementById('pillSuggest');
  if(!input) return;
  let hl = -1;
  let matches = [];
  function render(q){
    q = (q||'').trim().toLowerCase();
    matches = q ? TAG_LIST.filter(t => t.slug.includes(q) || (t.display_name||'').toLowerCase().includes(q)).slice(0,20) : TAG_LIST.slice(0,20);
    let html = matches.map((t,i) => {
      const prop = t.is_proposed ? ' proposed' : '';
      const cat = t.category ? ` [${esc(t.category)}]` : '';
      return `<div class="sg${prop}" data-i="${i}" data-slug="${esc(t.slug)}">${esc(t.display_name)}${cat} <span class="cnt">${esc(t.slug)} · ${t.usage_count||0}</span></div>`;
    }).join('');
    const slug = slugify(q);
    if(slug && !TAGS_BY_SLUG[slug]){
      // v0.6 Item 8d follow-up C3: creating a pill now *requires* a category
      // choice. Mike refuses to leave uncategorized pills in the vocab, so
      // the single "+ Create proposed pill" line is replaced by one entry
      // per real category. Clicking any of them creates the tag with that
      // category attached and applies it to the current artifact.
      for(const cat of CATEGORY_ORDER){
        html += `<div class="sg propose" data-slug="${esc(slug)}" data-propose="1" data-cat="${esc(cat)}">+ Create "${esc(slug)}" as <span style="color:var(--gold2);font-weight:600">${esc(cat)}</span></div>`;
      }
    }
    sug.innerHTML = html;
    sug.classList.add('open');
    // Position below input
    const r = input.getBoundingClientRect();
    sug.style.left = r.left + 'px';
    sug.style.top = (r.bottom + window.scrollY) + 'px';
    sug.style.width = r.width + 'px';
    hl = -1;
  }
  input.addEventListener('input', e => render(e.target.value));
  input.addEventListener('focus', e => render(e.target.value));
  input.addEventListener('blur', () => setTimeout(() => sug.classList.remove('open'), 200));
  input.addEventListener('keydown', async e => {
    const items = sug.querySelectorAll('.sg');
    if(e.key === 'ArrowDown'){ e.preventDefault(); hl = Math.min(items.length-1, hl+1); items.forEach((x,i)=>x.classList.toggle('hl', i===hl)); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); hl = Math.max(0, hl-1); items.forEach((x,i)=>x.classList.toggle('hl', i===hl)); }
    else if(e.key === 'Enter'){
      e.preventDefault();
      // v0.6 Item 8d follow-up C3: Enter only applies the highlighted row.
      // If the highlight is a "+ Create ... as <cat>" propose row, that
      // row carries a data-cat, so we can create with a real category. If
      // the user hit Enter with no highlight AND the slug doesn't exist,
      // we refuse — creating blind would drop the pill into the
      // uncategorized bucket Mike banned. Autocomplete must be used.
      let slug = null;
      let cat = null;
      if(hl >= 0 && items[hl]){
        slug = items[hl].dataset.slug;
        cat = items[hl].dataset.cat || null;
        const isPropose = items[hl].dataset.propose === '1';
        if(isPropose && !cat) return;  // guard, should not happen
        if(isPropose && !TAGS_BY_SLUG[slug]){
          try{
            await api('/api/tag-create', {slug, display_name: titleCase(slug.split(':').pop()), category: cat, is_proposed: 0});
            await loadTags();
          }catch(err){ toast('Create failed: ' + err.message, 'err'); return; }
        }
      } else {
        slug = slugify(input.value);
        if(!slug) return;
        if(!TAGS_BY_SLUG[slug]){
          toast('Pick a category from the suggestions to create "'+slug+'"','err');
          return;
        }
      }
      if(!slug) return;
      addAppliedTag(slug);
      input.value = '';
      sug.classList.remove('open');
    } else if(e.key === 'Escape'){ sug.classList.remove('open'); }
  });
  sug.addEventListener('mousedown', async e => {
    const el = e.target.closest('.sg');
    if(!el) return;
    e.preventDefault();
    const slug = el.dataset.slug;
    const cat  = el.dataset.cat || null;
    if(el.dataset.propose){
      // v0.6 Item 8d follow-up C3: every propose row now carries a
      // data-cat (one row per CATEGORY_ORDER entry). Pass that category
      // through so the new tag lands in a real bucket, not "uncategorized".
      try{
        await api('/api/tag-create', {slug, display_name: titleCase(slug.split(':').pop()), category: cat, is_proposed: 0});
        await loadTags();
      }catch(err){ toast('Create failed: ' + err.message, 'err'); return; }
    }
    addAppliedTag(slug);
    input.value = '';
    sug.classList.remove('open');
  });
})();

// v0.6 Item 8: renderVaultTagBar + cycleVaultTag removed — the tag-pill
// filter row above the table was dropped per Mike. Text search covers the
// same use case without flooding screen real estate with low-value chips.
function filterArtifacts(){
  // v0.6 Item 8: filter surface trimmed down to just search + "hide children"
  // (default on). Date selectors, status dropdown, storage dropdown, and the
  // tag-pill chip filters were removed — they all move to the column
  // header-sort / search path. FILTER_TAG_STATE is kept in memory for
  // backwards compat but is never populated now that the pill bar is gone.
  const searchEl = document.getElementById('vSearch');
  const search = searchEl ? searchEl.value.trim().toLowerCase() : '';
  return ARTIFACTS.filter(a => {
    if(a.parent_artifact_id) return false;  // always hide children inline
    if(a.status!=='vault' && a.status!=='released') return false;  // default scope
    if(search){
      const hay = [(a.description_short||''),(a.description_long||''),(a.tags||''),(a.extracted_text||''),(a.source_url||''),(a.id||''),(a.notes||'')].join(' ').toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });
}
function vaultRender(){
  // v0.6 Item 8: sort is handled entirely by VAULT_SORT_COL/DIR clicked from
  // the column headers (previously a separate vSort dropdown existed). If no
  // sort was clicked, default to post_date desc.
  let arr = filterArtifacts();
  const col = VAULT_SORT_COL || 'post_date';
  const dir = VAULT_SORT_COL ? VAULT_SORT_DIR : 'desc';
  const mul = dir==='asc' ? 1 : -1;
  arr = [...arr].sort((a,b)=>{
    let av, bv;
    if(col==='status'){ av = a.status==='released'?1:0; bv = b.status==='released'?1:0; }
    else { av = a[col]||''; bv = b[col]||''; }

  renderDetail(CURRENT_ARTIFACT_ID);

function thumbHtml(a){
  // v0.6 Item 8b: HTML/webpage artifacts get a clean "webpage" placeholder
  // (globe + hostname) instead of the old live-embedded HTML render that
  // Mike flagged on Medusa's Disco. The placeholder kicks in when the media
  // type is html/webpage, or when the local asset path ends in .html/.htm
  // and no thumbnail exists — i.e. anytime we'd otherwise try to render
  // the HTML source file as an <img>.
  const mt = (a.media_type||'').toLowerCase();
  const lap = (a.local_asset_path||'').toLowerCase();
  const isWeb = mt==='html' || mt==='webpage' || lap.endsWith('.html') || lap.endsWith('.htm');
  if(a.thumbnail_path){
    return `<img src="/image-raw?path=${encodeURIComponent(a.thumbnail_path)}" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{className:'noThumb',textContent:'${esc(a.media_type||'no thumb')}'}))">`;
  }
  if(isWeb){
    let host = '';
    try { host = a.source_url ? new URL(a.source_url).host.replace(/^www\./,'') : ''; } catch(_){}
    return `<div class="webThumb"><div class="globe">&#127760;</div>${host?`<div class="host">${esc(host)}</div>`:''}<div class="tag">WEB PAGE</div></div>`;
  }
  if(a.storage_mode!=='url_only' && a.local_asset_path){
    return `<img src="/image-raw?path=${encodeURIComponent(a.local_asset_path)}" data-asset-path="${esc(a.local_asset_path)}" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{className:'noThumb',textContent:'${esc(a.media_type||'asset')}'}))">`;

// v0.6 Item 8: column drag-resize for the vault table — same pattern as the
// Tag Manager. The grip suppresses its click after drag so the column header
// doesn't fire a sort cycle when the user releases after a resize.
function _installVaultColResizers(){
  const table = document.querySelector('#vaultTable table');
  if(!table) return;
  const cols = table.querySelectorAll('colgroup > col');
  const ths  = table.querySelectorAll('thead th');
  ths.forEach((th, i) => {
    if(i >= cols.length || i === ths.length - 1) return;  // no grip on last col
    if(th.querySelector('.colGrip')) return;
    const grip = document.createElement('div');
    grip.className = 'colGrip';
    th.appendChild(grip);
    grip.addEventListener('click', e => e.stopPropagation());
    grip.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.pageX;
      const startW = cols[i].offsetWidth || th.offsetWidth;
      const onMove = (ev) => {
        cols[i].style.width = Math.max(40, startW + (ev.pageX - startX)) + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const swallow = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        th.addEventListener('click', swallow, {capture:true, once:true});
        setTimeout(() => th.removeEventListener('click', swallow, {capture:true}), 0);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// v0.6 Item 8d #4: click-to-toggle tag removal in the side panel.
//
// The 8c "pending" variant (flag-on-click, batch-commit-on-navigate) was
// reverted per Mike. This replacement is:
//   - Click a pill → fire /api/artifact-update immediately with the tag
//     removed. No pending state.
//   - The clicked pill stays in the DOM and gets an ".unselected" class
//     (dim + dashed + strikethrough). You can see exactly which tags you
//     just removed without the panel rearranging under your cursor.
//   - Clicking an unselected pill re-adds the tag (toggle-back / undo).
//   - The panel is NOT re-rendered after the API call — the unselected
//     pills only vanish on the next fresh render (select another artifact
//     and come back, or switch tabs). That's deliberate: it matches Mike's
//     spec "leave in place; next time we refresh, only show active tags."
//
// Local state (the ARTIFACTS entry and its _tags array) is mutated so
// other surfaces and the next renderDetail see the new truth.
async function toggleTagOnArtifact(aid, slug, pillEl){
  const a = ARTIFACTS.find(x => x.id === aid);
  if(!a) return;
  const currentTags = a._tags || [];
  const currentlyOn = currentTags.includes(slug);
  const newTags = currentlyOn
    ? currentTags.filter(t => t !== slug)
    : [...currentTags, slug];
  try{
    await api('/api/artifact-update', {id: aid, fields: {tags: newTags}});
    a._tags = newTags;
    a.tags  = JSON.stringify(newTags);
    // Swap ONLY the clicked pill's visual — don't re-render the panel.
    if(pillEl) pillEl.classList.toggle('unselected', currentlyOn);
  }catch(e){
    toast('Tag update failed: '+e.message, 'err');
  }
}

// v0.6 Item 8b: drag-resize the side panel via the grip element. Mousedown
// on the grip captures pageX, then mousemove updates the panel's flex-basis
// so it grows/shrinks on the right of the viewport. Bounded by min-width
// (220px from CSS) and a max of 70% of the vault body width so it can't
// fully consume the main content area.
(function _installVaultDetailResizer(){
  const grip = document.getElementById('vaultDetailGrip');
  if(!grip) return;
  grip.addEventListener('mousedown', (e) => {
    const panel = document.getElementById('vaultDetail');
    const body  = document.getElementById('vaultBody');
    if(!panel || !body) return;
    e.preventDefault();
    grip.classList.add('dragging');
    const startX = e.pageX;
    const startW = panel.offsetWidth;
    const maxW = Math.floor(body.offsetWidth * 0.7);
    const onMove = (ev) => {
      const delta = startX - ev.pageX;        // drag left  ⇒ wider panel
      const w = Math.max(220, Math.min(maxW, startW + delta));
      panel.style.flex = `0 0 ${w}px`;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      grip.classList.remove('dragging');
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

  // click, server requeues, next adjacent vault artifact is selected, you
  // stay in vault. To pick the "next adjacent" row we capture the position
  // inside VAULT_VISIBLE_IDS BEFORE the refresh, then pick the same index
  // (which, after the demoted row is gone, now points at the next row) or
  // fall back to the previous row if we were at the tail.
  try{
    const visBefore = (typeof VAULT_VISIBLE_IDS !== 'undefined' && Array.isArray(VAULT_VISIBLE_IDS))
      ? VAULT_VISIBLE_IDS.slice() : [];
    const wasIdx = visBefore.indexOf(id);
    await api('/api/artifact-requeue', {id: id});
    await loadDb();
    await loadQueue();
    vaultRender();
    // Post-render, VAULT_VISIBLE_IDS no longer contains `id`. Pick the
    // neighbour at wasIdx (now the row that came after), or wasIdx-1 if we
    // were at the end, or null if the vault is empty.
    let nextId = null;
    if(Array.isArray(VAULT_VISIBLE_IDS) && VAULT_VISIBLE_IDS.length){
      if(wasIdx >= 0 && wasIdx < VAULT_VISIBLE_IDS.length){
        nextId = VAULT_VISIBLE_IDS[wasIdx];
      } else if(wasIdx > 0){
        nextId = VAULT_VISIBLE_IDS[wasIdx - 1];
      } else {
        nextId = VAULT_VISIBLE_IDS[0];
      }
    }
    if(nextId){
      CURRENT_ARTIFACT_ID = nextId;
      renderDetail(nextId);
    } else {
      CURRENT_ARTIFACT_ID = null;
      renderDetail(null);
    }
    toast('Demoted to inbox','ok');
  }
  catch(e){ toast('Requeue failed: '+e.message,'err'); }
}

// v0.6 — three-state column sort: null -> 'asc' -> 'desc' -> null.
function vocabSortClick(col){
  if(VOCAB_SORT_COL !== col){ VOCAB_SORT_COL = col; VOCAB_SORT_DIR = 'asc'; }
  else if(VOCAB_SORT_DIR === 'asc'){ VOCAB_SORT_DIR = 'desc'; }
  else { VOCAB_SORT_COL = null; VOCAB_SORT_DIR = null; }
  vocabRender();

// Pull the comparable value for a row given a sort column key.
function _vocabSortKey(row, col){
  switch(col){
    case 'slug':         return (row.slug || '').toLowerCase();
    case 'display_name': return (row.display_name || '').toLowerCase();
    case 'category':     return (row.category || '').toLowerCase(); // '' sorts first ASC
    case 'status':       return row.is_proposed ? 'proposed' : 'accepted';
    case 'usage':        return row.usage_count || 0;
    default:             return '';
  }
}
function _vocabCompare(a, b, col, dir){
  const ka = _vocabSortKey(a, col), kb = _vocabSortKey(b, col);
  let c;
  if(typeof ka === 'number' && typeof kb === 'number'){ c = ka - kb; }
  else { c = String(ka).localeCompare(String(kb)); }
  if(c === 0) c = (a.slug || '').localeCompare(b.slug || '');
  return dir === 'desc' ? -c : c;
}
function _refreshSortIndicators(){
  document.querySelectorAll('#vocabTable thead th.sortable').forEach(th=>{
    const col = th.dataset.sort;
    const ind = th.querySelector('.sortInd');
    th.classList.toggle('sort-active', col === VOCAB_SORT_COL && !!VOCAB_SORT_DIR);
    if(ind){
      ind.textContent = (col === VOCAB_SORT_COL)
        ? (VOCAB_SORT_DIR === 'asc' ? '\u25B2' : VOCAB_SORT_DIR === 'desc' ? '\u25BC' : '')
        : '';
    }
  });
}
function vocabRender(){
  const q = (document.getElementById('vocabSearch')?.value||'').toLowerCase();
  let rows = TAG_LIST.slice();
  if(q) rows = rows.filter(r => r.slug.includes(q) || (r.display_name||'').toLowerCase().includes(q));
  // v0.6 default sort: category ASC, then display_name ASC. Click cycles to
  // explicit per-column ASC -> DESC -> back to default.
  if(VOCAB_SORT_COL && VOCAB_SORT_DIR){
    rows.sort((a,b)=> _vocabCompare(a, b, VOCAB_SORT_COL, VOCAB_SORT_DIR));
  } else {
    rows.sort((a,b)=>{
      const ca = (a.category || '').toLowerCase();
      const cb = (b.category || '').toLowerCase();
      if(ca !== cb) return ca.localeCompare(cb);
      const da = (a.display_name || '').toLowerCase();
      const db = (b.display_name || '').toLowerCase();
      if(da !== db) return da.localeCompare(db);
      return (a.slug || '').localeCompare(b.slug || '');
    });
  }
  _refreshSortIndicators();
  const body = document.getElementById('vocabBodyRows');
  // v0.6 Item 8d follow-up C4: Status column + ACCEPT/REJECT removed. Tags
  // are tags. EDIT and DELETE are the only per-row actions.
  body.innerHTML = rows.map(r=>{
    const usage = r.usage_count||0;
    return `<tr>
      <td>${usage}</td>
      <td>${esc(r.category||'')}</td>
      <td>${esc(r.display_name)}</td>
      <td><div class="tagActions">
        <button onclick="openTagEditModal('${esc(r.slug)}')">EDIT</button>
        <button onclick="tagDelete('${esc(r.slug)}', ${usage})">DELETE</button>
      </div></td>
      <td class="slugCol"><code>${esc(r.slug)}</code></td>
    </tr>`;
  }).join('');
  _installVocabColResizers();
}

// ================= v0.6 Item 6 follow-up: drag-to-resize columns =================
// Adds a thin col-resize grip at the right edge of each TH. First mousedown
// puts the component into resizing mode so the sort onclick on the parent TH
// doesn't fire on the release. Widths live on the <col> elements (table-
// layout:fixed), so resizing stays in sync between header and body.
function _installVocabColResizers(){
  const table = document.getElementById('vocabTable');
  if(!table) return;
  const cols = table.querySelectorAll('colgroup > col');
  const ths  = table.querySelectorAll('thead th');
  if(!cols.length || !ths.length) return;
  ths.forEach((th, i) => {
    if(i >= cols.length) return;
    if(i === ths.length - 1) return;               // last col: nothing to resize
    if(th.querySelector('.colGrip')) return;       // already installed
    const grip = document.createElement('div');
    grip.className = 'colGrip';
    th.appendChild(grip);
    grip.addEventListener('click', e => e.stopPropagation());
    grip.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.pageX;
      const startW = cols[i].offsetWidth || th.offsetWidth;
      const onMove = (ev) => {
        const newW = Math.max(40, startW + (ev.pageX - startX));
        cols[i].style.width = newW + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        // Swallow the click that fires after mouseup so the sort header
        // doesn't trigger.
        const swallow = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        th.addEventListener('click', swallow, {capture:true, once:true});
        setTimeout(() => th.removeEventListener('click', swallow, {capture:true}), 0);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// one call, includes new_slug when the user changed the slug. On 409
// merge_required (collision in same category), opens the merge-offer dialog
// from Item 3 so the user can fold old→existing without losing artifacts.
async function submitTagEdit(oldSlug){
  const newSlug = slugify(document.getElementById('mEditSlug').value);
  const disp = document.getElementById('mEditDisp').value.trim();
  const cat = document.getElementById('mEditCategory').value || null;
  const excl = document.getElementById('mEditExcl').checked ? 1 : 0;

  const body = {slug: oldSlug, display_name: disp, category: cat, is_exclusive: excl, description: desc};
  if(newSlug !== oldSlug) body.new_slug = newSlug;
  // Fetch inline so we can inspect a 409 merge_required response.
  let resp, data;
  try{
    resp = await fetch(API_BASE + '/api/tag-update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const txt = await resp.text();
    try{ data = JSON.parse(txt); } catch(_){ data = {raw: txt}; }

}

// v0.5 — attach-to-parent modal for vault detail.
function openAttachParentModal(childId){
  // Walk descendants of childId (must exclude self + descendants).
  const excluded = new Set([childId]);
  let frontier = [childId];
  while(frontier.length){
    const next = [];
    for(const pid of frontier){
      for(const a of ARTIFACTS){
        if(a.parent_artifact_id === pid && !excluded.has(a.id)){
          excluded.add(a.id); next.push(a.id);
        }
      }
    }
    frontier = next;
  }
  openModal(`
    <h3>Attach to parent</h3>
    <div class="row"><label>Search</label><input id="mAttachSearch" placeholder="id, description, url..." oninput="renderAttachCandidates('${esc(childId)}')"></div>
    <div class="attachCandidates" id="mAttachList"></div>
    <div class="actions">
      <button onclick="closeModal()">CANCEL</button>
    </div>
  `);
  // Stash excluded set for the renderer.
  window.__attachExcluded = excluded;
  renderAttachCandidates(childId);
}
function renderAttachCandidates(childId){
  const host = document.getElementById('mAttachList');
  if(!host) return;
  const q = (document.getElementById('mAttachSearch')?.value || '').trim().toLowerCase();
  const excluded = window.__attachExcluded || new Set([childId]);
  const rows = ARTIFACTS.filter(a => !excluded.has(a.id)).filter(a => {
    if(!q) return true;
    const hay = [a.id, a.description_short, a.description_long, a.source_url, a.source_platform].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  }).slice(0, 40);
  host.innerHTML = rows.length ? rows.map(a => {
    const thumb = (a.thumbnail_path || a.local_asset_path)
      ? `<img src="/image-raw?path=${encodeURIComponent(a.thumbnail_path || a.local_asset_path)}" onerror="this.style.visibility='hidden'">`
      : `<div style="width:48px;height:48px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text2);font:9px var(--mono)">${esc(a.media_type||'')}</div>`;
    return `<div class="attachCand" onclick="attachParentTo('${esc(childId)}','${esc(a.id)}')">
      ${thumb}
      <div class="ci">
        <div class="cid">${esc(a.id)}</div>
        <div class="csh">${esc(a.description_short||'')}</div>
        <div class="cm">${esc(a.source_platform||'')} · ${esc(fmtDate(a.post_date))}</div>
      </div>
    </div>`;
  }).join('') : `<div style="padding:10px;color:var(--text2);font:12px var(--mono)">No matches</div>`;
}
async function attachParentTo(childId, parentId){
  try{
    await api('/api/artifact-update', {id: childId, fields: {parent_artifact_id: parentId}});
    await loadDb(); vaultRender(); closeModal(); toast(`Attached to ${parentId}`, 'ok');
  }catch(e){ toast('Attach failed: ' + e.message, 'err'); }
}
async function detachParent(childId){
  if(!confirm('Detach from parent?')) return;
  try{
    await api('/api/artifact-update', {id: childId, fields: {parent_artifact_id: null}});
    await loadDb(); vaultRender(); toast('Detached', 'ok');
  }catch(e){ toast('Detach failed: ' + e.message, 'err'); }
}
function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', (e)=>{
  if(e.target===e.currentTarget) closeModal();
});
// v0.6 Item 6: ESC cancels any open in-app modal.
document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Escape') return;
  const bg = document.getElementById('modalBg');
  if(bg && bg.classList.contains('open')){
    e.preventDefault();
    closeModal();
  }
});
// v0.6 Item 8: keyboard up/down moves the vault row selection. Only active
// when (a) the vault tab is the active pane, (b) no modal is open, (c) the
// user isn't typing in an input/textarea (so the search box keeps its normal
// caret behaviour). Works for both table and grid view — we just walk the
// current VAULT_VISIBLE_IDS list. If nothing is selected yet, arrow-down
// selects the first row, arrow-up selects the last.
document.addEventListener('keydown', (e)=>{
  if(e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
  const vaultPane = document.getElementById('vaultPane');
  if(!vaultPane || !vaultPane.classList.contains('active')) return;
  const bg = document.getElementById('modalBg');
  if(bg && bg.classList.contains('open')) return;
  const tag = (e.target && e.target.tagName || '').toUpperCase();
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if(!VAULT_VISIBLE_IDS.length) return;
  const idx = CURRENT_ARTIFACT_ID ? VAULT_VISIBLE_IDS.indexOf(CURRENT_ARTIFACT_ID) : -1;
  let nextIdx;
  if(e.key === 'ArrowDown'){
    nextIdx = (idx < 0) ? 0 : Math.min(VAULT_VISIBLE_IDS.length - 1, idx + 1);
  } else {
    nextIdx = (idx < 0) ? VAULT_VISIBLE_IDS.length - 1 : Math.max(0, idx - 1);
  }
  if(nextIdx === idx) return;
  e.preventDefault();
  selectArtifact(VAULT_VISIBLE_IDS[nextIdx]);
  // Scroll the newly-selected row into view in the table.
  const tr = document.querySelector(`#vaultTableBody tr[data-id="${VAULT_VISIBLE_IDS[nextIdx]}"]`);
  if(tr && tr.scrollIntoView) tr.scrollIntoView({block:'nearest'});
});

// ==================== SERVER HEALTH (v0.6 item 5) ====================
// Alert badge stays hidden while /ping is healthy. After 2 consecutive
// failures it flips visible; recovers the moment /ping returns 200. Click
// the badge to force an immediate re-check.
let _SRV_FAILURES = 0;
async function _srvHealthTick(){
  try{
    const r = await fetch(API_BASE + '/ping', {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP ' + r.status);
    _SRV_FAILURES = 0;
    _srvSetAlert(false, '');
  }catch(e){
    _SRV_FAILURES++;
    if(_SRV_FAILURES >= 2){
      _srvSetAlert(true,
        `Server not responding (${_SRV_FAILURES} failed check${_SRV_FAILURES===1?'':'s'}). Click to retry.`);
    }
  }
}
function _srvSetAlert(bad, tip){
  const el = document.getElementById('srvAlert');
  if(!el) return;
  el.classList.toggle('visible', !!bad);
  if(tip) el.title = tip;
}
setInterval(_srvHealthTick, 20000);  // poll every 20s while page is open

// ==================== STARTUP ====================
// v0.6 Item 8d follow-up C1/C2: loadTags() MUST run before loadQueue()/loadDb()
// triggers any inbox or vault render. If the pill wall renders while TAG_LIST
// is empty, every currently-set slug falls into the __uncategorized__ ghost
// bucket (because TAGS_BY_SLUG[slug] is undefined) and the accumulated view
// shows (0) even though states exist. On a subsequent pill click, the wall
// re-renders from the same empty TAG_LIST and the just-clicked pill has
// nowhere to show up — looks like it vanished. Load vocab first.
async function startup(){
  _srvHealthTick();   // prime the alert-badge state
  SQL = await initSqlJs({locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/'+f});
  await loadTags();   // vocab first — pill wall depends on TAG_LIST/TAGS_BY_SLUG
  await loadDb();
  await loadQueue();
}
startup();
</script>
