<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<style>
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --gold:#C9A84C;--gold2:#a8882e;
  --text:#ddd;--text2:#999;
  --red:#c44;--green:#4a4;--blue:#4a8;
  --border:#333;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  /* pill-redesign 2026-05-24 §6: museum-aligned pill palette, scoped to pills.
     MV's --gold etc. stay untouched — only the pill aesthetic adopts museum
     constants (HrExhibitFlow.jsx:299 pill style function). */
  --pill-gold:#b8974a;       /* museum GOLD / GOLD_HI */
  --pill-ink-soft:#0d0d0d;   /* museum INK_SOFT (active bg) */
  --pill-border:#1a1a1a;     /* museum BORDER (default outline) */
  --pill-border-hi:#252525;  /* museum BORDER_HI (dimmed) */
  --pill-text-muted:#6a5520; /* museum default-text muted gold */
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);overflow:hidden;height:100vh}
button{font-family:var(--sans);cursor:pointer;border:none;padding:6px 14px;border-radius:4px;font-size:13px;background:var(--bg3);color:var(--text)}
button:hover{background:var(--bg4)}
button:disabled{opacity:.4;cursor:not-allowed}
input,textarea,select{font-family:var(--mono);background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:3px;font-size:13px}
textarea{resize:vertical;font:13px var(--sans)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#444}

#topBar{display:flex;align-items:center;background:var(--bg2);padding:0 16px;height:44px;gap:0}
#topBar .logo{font:600 16px var(--mono);color:var(--gold);margin-right:24px;white-space:nowrap}
/* v0.6 Item 6 follow-up: no underline on the title bar or active tab; active
   tab is indicated by gold text color only. */
.tab-btn{background:none;color:var(--text2);font:600 13px var(--mono);padding:10px 20px;border-radius:0;letter-spacing:.5px}
.tab-btn:hover{color:var(--text);background:none}
.tab-btn.active{color:var(--gold)}
#topBar .spacer{flex:1}
/* v0.6 item 5: red alert pill — hidden unless server is unreachable. */
#topBar .alertBadge{display:none;align-items:center;gap:6px;background:var(--red);color:#fff;padding:4px 10px;border-radius:10px;font:600 11px var(--mono);letter-spacing:.5px;margin-right:12px;cursor:pointer}
#topBar .alertBadge.visible{display:inline-flex}
#topBar .alertBadge .dot{width:6px;height:6px;border-radius:50%;background:#fff}
#topBar .alertBadge:hover{filter:brightness(1.1)}
/* v0.6 Item 6: context-aware action cluster in the title bar. Shows the
   button group matching the currently-active tab; hidden otherwise. */
#topBar .tabActions{display:none;gap:6px;align-items:center;margin-right:10px}
#topBar .tabActions.active{display:flex}
#topBar .tabActions button{font:600 11px var(--mono);padding:5px 10px}
#topBar .tabActions input[type="text"]{font:11px var(--mono);padding:4px 8px;width:180px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:3px}
#topBar .tabActions .btnDanger{background:#622;color:var(--red);border:1px solid var(--red)}

#contentArea{height:calc(100vh - 44px);overflow:hidden;position:relative}
.tabPane{display:none;height:100%;overflow:hidden}
.tabPane.active{display:flex;flex-direction:column}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;font:13px var(--mono);z-index:9999;animation:fadeUp .3s}
.toast.ok{background:#284;color:#cfc}.toast.err{background:#622;color:#fcc}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{50%{opacity:.4}}

/* ============ INBOX ============ */
#inboxPane{flex-direction:row !important}
#inboxLeft{flex:1;display:flex;flex-direction:column;min-width:0}
#inboxViewer{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#inboxViewer img{max-width:100%;max-height:100%;object-fit:contain}
#inboxViewer .noMedia{color:var(--text2);font:13px var(--mono);text-align:center;padding:40px}
#inboxNav{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border)}
#inboxNav select{flex:1;max-width:280px}
#inboxNav .prog{font:11px var(--mono);color:var(--text2)}
#inboxAiBar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--border)}
.aiDot{width:10px;height:10px;border-radius:50%;background:var(--text2)}
.aiDot.run{background:orange;animation:pulse 1s infinite}
.aiDot.ok{background:var(--green)}
.aiDot.err{background:var(--red)}
/* v0.6 Item 8d follow-up C1: collapsed the earlier dual-scroll design back
   to a SINGLE scrollbar. #inboxRight owns the only overflow:auto; pillWall
   and inboxForm just sit inside it in normal flow. Previous attempt used
   two independent scroll regions (one for pills, one for the form) to
   solve the "sticky pill wall overlapping form content" bug, but Mike saw
   both scrollbars at once and asked "Dbl scroller?". Single scroll is the
   simpler model — pill wall is the first thing in the panel, scrolls away
   as the form comes in, same as any other long form. */
#inboxRight{width:420px;display:flex;flex-direction:column;overflow-y:auto;background:var(--bg2);border-left:1px solid var(--border);padding:12px}
#inboxForm{flex:0 0 auto;min-height:0}
.fieldGroup{margin-bottom:12px}
.fieldGroup label{display:block;font:600 11px var(--mono);color:var(--gold);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.fieldGroup input,.fieldGroup textarea,.fieldGroup select{width:100%}
.fieldGroup textarea{min-height:60px}
.fieldGroup.row{display:flex;gap:8px}
.fieldGroup.row > div{flex:1}
.fieldGroup.warn label{color:var(--red)}
.fieldGroup.warn input,.fieldGroup.warn textarea,.fieldGroup.warn select{border-color:var(--red);box-shadow:0 0 0 1px rgba(204,68,68,.25)}
.sectionHead{font:600 11px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);padding-bottom:4px;margin:16px 0 8px}
.radioRow{display:flex;gap:4px;flex-wrap:wrap}
.radioRow label{display:inline-flex;align-items:center;gap:3px;font:11px var(--mono);color:var(--text2);padding:2px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;cursor:pointer}
.radioRow input[type=radio]{margin:0}
.radioRow input[type=radio]:checked + span{color:var(--gold)}
.radioRow label:has(input:checked){border-color:var(--gold);color:var(--gold)}

/* v0.6 Item 7: inbox decision buttons relocated to the title bar (right side);
   converted to outline style so they read as buttons, not as status chips. */
.btnScrap,.btnKeep,.btnRelease{background:transparent;font-weight:600;border-radius:4px;font-family:var(--mono);letter-spacing:.3px}
.btnScrap {color:var(--red);border:1px solid var(--red)}
.btnScrap:hover {background:rgba(204,68,68,.14);border-color:#e55}
.btnKeep  {color:var(--gold);border:1px solid var(--gold)}
.btnKeep:hover  {background:rgba(201,168,76,.14);border-color:var(--gold2)}
.btnRelease {color:var(--green);border:1px solid var(--green)}
.btnRelease:hover {background:rgba(68,170,68,.14);border-color:#6c6}
.btnNav{background:var(--bg3);color:var(--text);border:1px solid var(--border)}

/* ============ TAG PICKER ============ */
.tagPicker{margin-top:4px}
.tagPicker .appliedPills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:22px;padding:4px;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.tagPicker .appliedPills:empty::before{content:'(no tags)';color:var(--text2);font:11px var(--mono);font-style:italic;padding:2px 4px}
.tagPill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;font:11px var(--mono);background:var(--gold);color:#111;border-radius:3px;cursor:default}
.tagPill.proposed{background:transparent;color:var(--gold);border:1px dashed var(--gold);font-style:italic}
.tagPill .x{cursor:pointer;font-weight:600;margin-left:2px;opacity:.8}
.tagPill .x:hover{opacity:1;color:var(--red)}
.tagInput{position:relative}
.tagInput input{width:100%}
.tagSuggest{position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:var(--bg2);border:1px solid var(--gold);border-radius:3px;z-index:50;display:none}
.tagSuggest.open{display:block}
.tagSuggest .sg{padding:4px 8px;font:11px var(--mono);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.tagSuggest .sg:hover,.tagSuggest .sg.hl{background:var(--bg3);color:var(--gold)}
.tagSuggest .sg .cnt{color:var(--text2);font-size:10px}
.tagSuggest .sg.propose{color:var(--gold);font-style:italic}
.tagBrowse{margin-top:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;padding:4px;background:var(--bg)}
.tagGroup{margin-bottom:8px}
.tagGroup .gLabel{font:600 10px var(--mono);color:var(--gold2);text-transform:uppercase;margin-bottom:3px;letter-spacing:.5px}
.tagGroup .gTags{display:flex;flex-wrap:wrap;gap:3px}
.tagChip{padding:2px 6px;font:11px var(--mono);background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:3px;cursor:pointer;user-select:none}
.tagChip:hover{color:var(--text);border-color:var(--text2)}
.tagChip.on{background:var(--gold);color:#111;border-color:var(--gold)}
.tagChip.proposed{border-style:dashed;font-style:italic}
.tagChip .cnt{opacity:.6;margin-left:3px;font-size:9px}

/* ============ v0.5 PILL WALL ============ */
.pillWall{margin-top:4px}
/* v0.6 Item 8d follow-up C1-round2: pill wall and pillAddWrap live in normal
   flow. No borders — earlier revision added border-bottom to separate them
   from the form below, but Mike read those lines as "bars" and wanted them
   gone. Vertical spacing alone (margin-bottom:6px on pillAddWrap) is enough
   of a break for the single-scroll panel. */
#inboxRight > .pillWall{
  flex-shrink:0;
  background:var(--bg2);
  padding-bottom:4px;
}
#inboxRight > .pillAddWrap{
  flex-shrink:0;
  background:var(--bg2);
  margin-bottom:6px;
}
.pillCategory{margin-bottom:10px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);overflow:hidden}
/* v0.6 Item 7: category title left-justified, chevron then label, 0/N pinned
   to the right via margin-left:auto (explicit, independent of flex justify). */
.pillCategory > summary{cursor:pointer;font:600 11px var(--mono);color:var(--gold);padding:6px 8px;letter-spacing:.5px;text-transform:uppercase;user-select:none;list-style:none;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:flex-start;align-items:center;gap:6px}
.pillCategory > summary .summaryCount{margin-left:auto}
.pillCategory > summary::-webkit-details-marker{display:none}
.pillCategory > summary::before{content:'▸';margin-right:6px;color:var(--gold2);transition:transform .1s}
.pillCategory[open] > summary::before{transform:rotate(90deg);display:inline-block}
.pillCategory .summaryCount{font:10px var(--mono);color:var(--text2);font-weight:400}
/* pill-redesign 2026-05-24 §3+§8: when a category group is collapsed because
   it has 'on' pills, the summary header shows those selected values inline
   as muted-outlined pills (Pass B aesthetic). Click on a summary-inline
   pill = togglePill (same as APPLIED-strip click → 'neutral'). The pill's
   own onclick stops propagation so the <details> doesn't toggle. */
.pillCategory > summary > .summaryValues{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-left:6px}
.pillCategory .catWarn{color:var(--red);margin-left:6px;font-size:10px}
.pillCategory .pills{display:flex;flex-direction:column;gap:4px;padding:6px 8px}
/* pill-redesign 2026-05-24 §6: museum-aligned aesthetic. Sharp corners,
   sansBody, muted-outlined default → INK_SOFT/GOLD active. The legacy
   five-class CSS (.on-conf / .on-unc / .off-sus / .off-may / .proposed)
   was replaced by .pill.on / .pill.neutral / .pill.exclude — see pillHtml.
   .pill.warn (red pulse) is orthogonal to state and preserved. */
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:0 10px;height:26px;line-height:24px;
  font:500 11.5px/24px var(--sans);letter-spacing:.02em;
  border-radius:0;cursor:pointer;user-select:none;white-space:nowrap;
  background:transparent;color:var(--pill-text-muted);
  border:1px solid var(--pill-border);
  transition:border-color .12s,color .12s,background .12s,opacity .12s;
}
.pill .cnt{opacity:.7;margin-left:2px;font-size:10px;font-weight:500;font-variant-numeric:tabular-nums;color:inherit}
.pill.on{background:var(--pill-ink-soft);color:var(--pill-gold);border-color:var(--pill-gold)}
.pill.neutral{background:transparent;color:var(--pill-text-muted);border-color:transparent;opacity:.7}
.pill.exclude{background:transparent;color:var(--pill-border-hi);border-color:var(--pill-border-hi);text-decoration:line-through}
.pill.warn{background:transparent;color:var(--red);border:1px solid var(--red);animation:warn-pulse 1.5s infinite;cursor:default}
.pill:hover:not(.warn){border-color:var(--pill-gold)}
/* pill-redesign 2026-05-24 §5: APPLIED-strip spreadsheet layout. One row
   per category-with-applied-pills. Left col = category name (muted, fixed
   width), right col = value-pills wrapping. Both 'on' and 'neutral' pills
   appear (neutral = was-applied-this-session, toggled off, dimmed). */
.pillAccumulated{display:flex;flex-direction:column;gap:6px;padding:8px 10px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);border-radius:0;min-height:38px}
.pillAccumulated.empty{flex-direction:row;align-items:center;justify-content:flex-start}
.pillAcc-empty{font:11px var(--mono);color:var(--text2);font-style:italic}
.pillAcc-row{display:flex;align-items:flex-start;gap:12px;min-height:26px}
.pillAcc-cat{flex:0 0 110px;font:500 10.5px/26px var(--sans);color:var(--pill-text-muted);letter-spacing:.05em;text-transform:uppercase;user-select:none}
.pillAcc-vals{flex:1 1 auto;display:flex;flex-wrap:wrap;gap:4px}
@keyframes warn-pulse{50%{opacity:.5}}
.pillAddWrap{display:flex;gap:6px;margin-top:6px;padding:4px 0}
#pillAdd{flex:1;font-family:var(--mono)}
.pillSuggest{position:absolute;max-height:200px;overflow-y:auto;background:var(--bg2);border:1px solid var(--gold);border-radius:3px;z-index:60;display:none;min-width:260px}
.pillSuggest.open{display:block}
.pillSuggest .sg{padding:4px 8px;font:11px var(--mono);cursor:pointer;display:flex;justify-content:space-between;gap:8px}
.pillSuggest .sg:hover,.pillSuggest .sg.hl{background:var(--bg3);color:var(--gold)}
.pillSuggest .sg.propose{color:var(--gold);font-style:italic}
.pillSuggest .sg .cnt{color:var(--text2);font-size:10px}

/* ============ v0.5 ATTACH MODAL ============ */
.attachCandidates{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;margin-top:6px;background:var(--bg3)}
.attachCand{display:flex;gap:8px;padding:6px;border-bottom:1px solid var(--border);cursor:pointer;align-items:center}
.attachCand:hover{background:var(--bg4)}
.attachCand img{width:48px;height:48px;object-fit:cover;background:var(--bg);border-radius:2px;flex-shrink:0}
.attachCand .ci{flex:1;min-width:0}
.attachCand .cid{font:600 11px var(--mono);color:var(--gold)}
.attachCand .csh{font:12px var(--sans);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attachCand .cm{font:10px var(--mono);color:var(--text2)}

.bulkList{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;padding:6px;background:var(--bg3);margin-top:6px}
.bulkList label{display:block;font:12px var(--mono);padding:2px 0;cursor:pointer}
.bulkList label:hover{color:var(--gold)}

/* ============ VAULT ============ */
/* v0.6 Item 8: #vaultToolbar and #vaultTagBar were removed per Mike. Search +
   view toggle live in #topBar .tabActions[data-for="vault"]; their styles are
   shared with the Tag Manager actions cluster. The GRID/TABLE buttons and the
   count badge now inherit from #topBar .tabActions. */
#vaultPane{flex-direction:column !important}
#topBar .tabActions .vbtn{padding:4px 10px;font-size:11px;background:var(--bg3);color:var(--text);border:1px solid var(--border);font-family:var(--mono);border-radius:3px;cursor:pointer}
#topBar .tabActions .vbtn.active{background:var(--gold);color:#111;border-color:var(--gold)}
#topBar .tabActions .cnt{font:11px var(--mono);color:var(--text2);margin-left:6px}

#vaultBody{flex:1;display:flex;overflow:hidden;position:relative}
#vaultContent{flex:1;overflow:auto;position:relative}

/* Grid view */
/* v0.6 Item 8b: grid cards slimmed to thumbnail + short desc + source badge
   per Mike. Removed: ID label, long desc line, date line, primary tag pill.
   Source badge sits at the bottom of the info strip as a small monogram
   (FB / IG / YT / RN / etc.) so the card tells the user where it came from
   at a glance without taking up a whole metadata row. */
#vaultGrid{padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}
.vCard{width:240px;background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative;display:flex;flex-direction:column}
.vCard:hover{border-color:var(--gold2)}
.vCard.selected{border-color:var(--gold)}
.vCard .thumbWrap{width:100%;height:150px;background:var(--bg);position:relative;overflow:hidden}
.vCard .thumbWrap img{width:100%;height:100%;object-fit:cover;display:block}
.vCard .thumbWrap .noThumb{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font:11px var(--mono);color:var(--text2);text-align:center;padding:10px}
/* v0.6 Item 8b: HTML/webpage artifacts get a clean "webpage" placeholder
   (globe glyph + URL host) instead of the old live-embedded HTML render. */
.vCard .thumbWrap .webThumb{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(180deg,#1a1d22 0%,#0f1115 100%);color:var(--text2);text-align:center;padding:10px;gap:6px}
.vCard .thumbWrap .webThumb .globe{font-size:34px;color:var(--blue);line-height:1}
.vCard .thumbWrap .webThumb .host{font:600 11px var(--mono);color:var(--text);word-break:break-all;line-height:1.3;max-width:90%}
.vCard .thumbWrap .webThumb .tag{font:9px var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.vCard .badges{position:absolute;top:4px;right:4px;display:flex;gap:2px}
.vCard .badge{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;background:rgba(0,0,0,.7);border-radius:3px;color:var(--gold)}
.vCard .info{padding:8px 10px;font-size:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.vCard .info .vshort{color:var(--text);font-size:12px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
.vCard .info .src{display:inline-flex;align-items:center;gap:4px;font:600 10px var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:.5px;align-self:flex-start;padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:var(--bg)}
.vCard .info .src.facebook   {color:#4c7cf3;border-color:#4c7cf3}
.vCard .info .src.instagram  {color:#e06a8a;border-color:#e06a8a}
.vCard .info .src.youtube    {color:#e04444;border-color:#e04444}
.vCard .info .src.tiktok     {color:#e0e0e0;border-color:#e0e0e0}
.vCard .info .src.reverbnation{color:#c9a84c;border-color:#c9a84c}
.vCard .info .src.fan        {color:#c9a84c;border-color:#c9a84c}
.vCard .info .src.local      {color:var(--text2)}

/* Table view */
/* v0.6 Item 8: table-layout fixed + colgroup so headers/cells align under
   sticky scroll, and so column widths are predictable for drag-resize. */
#vaultTable{padding:0;display:none}
#vaultTable table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
#vaultTable col.cvDate    {width:96px}
#vaultTable col.cvPlatform{width:110px}
#vaultTable col.cvShort   {width:auto}
#vaultTable col.cvStatus  {width:90px}
#vaultTable col.cvStorage {width:100px}
#vaultTable th{position:sticky;top:0;background:var(--bg2);padding:8px 10px;text-align:left;font:600 11px var(--mono);color:var(--gold);cursor:pointer;user-select:none;z-index:2;box-shadow:inset 0 -2px 0 var(--border);position:relative}
#vaultTable th:hover{background:var(--bg3)}
#vaultTable th .arr{color:var(--gold);margin-left:4px}
#vaultTable th .colGrip{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:3}
#vaultTable th .colGrip:hover{background:var(--gold);opacity:.4}
#vaultTable td{padding:5px 10px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#vaultTable tr{cursor:pointer}
#vaultTable tr:hover{background:var(--bg2)}
#vaultTable tr.selected{background:var(--bg3)}
#vaultTable tr.selected td{color:var(--gold)}
/* v0.6 Item 8: status column muted by default, green only for released
   (matches the muted/green storage style Mike asked for). pillBadge no
   longer carries a fill background for any state — color only, like the
   storage column. Released gets green text + a thin green border so it
   reads as the "active/done" state without shouting. Storage column has
   highlighting fully removed (text2 muted) per Mike. */
.pillBadge{display:inline-block;padding:0 2px;font:10px var(--mono);border-radius:2px;background:transparent;color:var(--text2)}
.pillBadge.vault{color:var(--text2)}
.pillBadge.inbox{color:var(--text2)}
.pillBadge.released{color:var(--green);border:1px solid var(--green);padding:0 5px}
.pillBadge.archived{color:var(--text2)}
.pillBadge.vaulted{color:var(--text2)}
.pillBadge.referenced{color:var(--text2)}
.pillBadge.url_only{color:var(--text2)}

/* Detail panel */
/* v0.6 Item 8b: default width dropped from 400 to 320 and the panel is now
   user-resizable via a grip on its left edge (see #vaultDetailGrip). The
   panel is a flex child, so we set flex:0 0 <px> at runtime rather than
   width. A min-width of 220 prevents the grip from closing the panel. */
/* v0.6 Item 8d #2: panel + grip are always rendered at their resting width.
   The empty-state placeholder (rendered by renderDetail when no selection)
   replaces the previous display:none / .open-class toggle. */
#vaultDetail{flex:0 0 320px;min-width:220px;overflow-y:auto;background:var(--bg2);border-left:1px solid var(--border);padding:12px;word-break:break-word;position:relative}
#vaultDetailGrip{width:6px;cursor:col-resize;background:transparent;flex:0 0 6px;margin:0;border-left:1px solid var(--border);border-right:1px solid var(--border);position:relative;z-index:4}
#vaultDetail .dEmpty{color:var(--text2);font:13px var(--sans);text-align:center;padding:40px 12px;font-style:italic}
#vaultDetailGrip:hover{background:rgba(201,168,76,.25)}
#vaultDetailGrip.dragging{background:rgba(201,168,76,.45)}
#vaultDetail .dSection{margin-bottom:14px}
#vaultDetail .dSection h4{font:600 11px var(--mono);color:var(--gold);text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px;letter-spacing:.5px}
#vaultDetail .dField{margin-bottom:8px}
#vaultDetail .dField label{font:10px var(--mono);color:var(--text2);display:block;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
#vaultDetail .dField .dVal{font:13px var(--sans);color:var(--text);padding:3px 6px;border-radius:3px;min-height:20px;word-break:break-word;white-space:pre-wrap;background:var(--bg3)}
#vaultDetail .dField .dVal:empty{color:var(--text2);font-style:italic}
#vaultDetail .dField .dVal:empty::before{content:'—'}
#vaultDetail .dField .dVal.clickable{cursor:pointer}
#vaultDetail .dField .dVal.clickable:hover{outline:1px solid var(--gold)}
#vaultDetail .dField input,#vaultDetail .dField textarea,#vaultDetail .dField select{width:100%;display:none}
#vaultDetail .dField.editing input,#vaultDetail .dField.editing textarea,#vaultDetail .dField.editing select{display:block}
#vaultDetail .dField.editing .dVal{display:none}
#vaultDetail .dHeroImg{width:100%;max-height:260px;object-fit:contain;background:var(--bg);border-radius:4px;margin-bottom:10px;display:block}
#vaultDetail .dChildren{display:flex;flex-wrap:wrap;gap:6px}
#vaultDetail .dChild{width:80px;background:var(--bg3);border-radius:3px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
#vaultDetail .dChild:hover{border-color:var(--gold)}
#vaultDetail .dChild img{width:100%;height:60px;object-fit:cover;display:block}
#vaultDetail .dChild .cid{font:9px var(--mono);color:var(--text2);padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dActions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
/* v0.6 Item 8b: action cluster reshape per Mike.
   SCRAP   = red      (permanent delete, hard-confirm modal)
   DEMOTE  = gold     (send back to Inbox for another pass)
   RELEASE = green    (STATE button — pressed/filled when released, unpressed
                       outline otherwise; single click toggles)
   ARCHIVE = gray     (neutral text2; hides from default views)
   The outline-only style (transparent fill, colored border) matches the
   Inbox commit cluster exactly. */
.dActions button{font-size:11px;padding:6px 10px;font-family:var(--mono);font-weight:600;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;letter-spacing:.3px}
.dActions button:hover{background:rgba(255,255,255,.04);border-color:var(--text2)}
.dActions .btnScrap  {color:var(--red);border-color:var(--red)}
.dActions .btnScrap:hover  {background:rgba(204,68,68,.14);border-color:#e55}
.dActions .btnDemote {color:var(--gold);border-color:var(--gold)}
.dActions .btnDemote:hover {background:rgba(201,168,76,.14);border-color:var(--gold2)}
.dActions .btnArchive{color:var(--text2);border-color:var(--border)}
.dActions .btnArchive:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--text2)}
/* State toggle: green outline when not released, green fill when released. */
/* v0.6 Item 8c: much stronger RELEASE state visual. The un-released variant
   now reads as a muted grey "NOT RELEASED" outlined button (obviously
   clickable-toggle, not a verb command), and the released variant is a
   loud filled-green chip with a ring to shout the state. */
.dActions .btnRelease       {color:var(--text2);border-color:var(--border);background:transparent}
.dActions .btnRelease:hover {background:rgba(68,170,68,.10);color:var(--green);border-color:var(--green)}
.dActions .btnRelease.on    {background:var(--green);color:#081a08;border-color:var(--green);box-shadow:0 0 0 2px rgba(68,170,68,.25)}
.dActions .btnRelease.on:hover{background:#6c6;border-color:#6c6}

/* v0.6 Item 8c C1: action cluster lives at the top of the side panel (was
   below the Description section). Flat border along the bottom visually
   anchors it to the panel header. */
/* v0.6 Item 8d #3: the four action buttons (SCRAP/DEMOTE/RELEASE/ARCHIVE)
   moved out of the side panel into #topBar .tabActions[data-for="vault"].
   The wrapping .dActions span still gives them flex/gap layout, but we need
   to zero the 10px top margin that was meant for in-panel stacking. */
#topBar #vaultArtifactActions{display:inline-flex;align-items:center}
#topBar #vaultArtifactActions:empty{display:none}
#topBar #vaultArtifactActions .dActions{margin-top:0;margin-left:6px}
#vaultDetail .dUrlTop h4{margin-top:0}

/* v0.6 Item 8d #4: side-panel tag pills are click-to-toggle. A click fires
   /api/artifact-update immediately (no pending state), but the pill stays
   in the panel with a dim/strikethrough ".unselected" look so you can see
   what you just removed. Clicking again re-adds the tag (toggle). The
   unselected pills only disappear on the next fresh render — navigate
   to another artifact and back, or switch tabs. */
.dTagList{display:flex;flex-wrap:wrap;gap:3px}
.dTagList .tagPill{font-size:10px}
#vaultDetail .dTagList .tagPill{cursor:pointer;transition:opacity .1s, filter .1s}
#vaultDetail .dTagList .tagPill:hover{filter:brightness(1.15)}
#vaultDetail .dTagList .tagPill.unselected{background:var(--bg3);color:var(--text2);border:1px dashed var(--text2);text-decoration:line-through;opacity:.55}
#vaultDetail .dTagList .tagPill.unselected:hover{opacity:.85;filter:none}

/* ============ VOCAB ADMIN ============ */
#vocabPane{flex-direction:column !important}
/* v0.6 Item 6: no local toolbar — all actions (search, + NEW TAG, ⇔ MERGE,
   × DELETE SELECTED) live in the title bar so the table gets every pixel. */
#vocabBody{flex:1;overflow:auto;position:relative;padding:0}
/* v0.6 Item 6 follow-up: table-layout:fixed so column widths (set via the
   <colgroup>) are authoritative and drag-resize actually moves boundaries. */
#vocabTable{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;background:var(--bg2);table-layout:fixed}
#vocabTable col.cUsage{width:60px}
#vocabTable col.cCategory{width:120px}
#vocabTable col.cDisplay{width:auto}        /* flex to fill */
#vocabTable col.cStatus{width:90px}
#vocabTable col.cActions{width:170px}
#vocabTable col.cSlug{width:200px}
/* v0.6 Item 6: Sticky header robustness. The scroll container is #vocabBody;
   thead TH sticks to its top=0. box-shadow (not border-bottom) for the rule
   line because borders on sticky TH drop during scroll in Chrome. */
#vocabTable thead th{
  position:sticky;top:0;z-index:10;
  padding:6px 8px;text-align:left;font:600 11px var(--mono);color:var(--gold);
  background:var(--bg2);box-shadow:inset 0 -2px 0 var(--border);
  user-select:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#vocabTable thead th.sortable{cursor:pointer}
#vocabTable thead th.sortable:hover{background:var(--bg3)}
#vocabTable thead th .sortInd{display:inline-block;margin-left:4px;width:10px;color:var(--text2);font-weight:400}
#vocabTable thead th.sort-active .sortInd{color:var(--gold);font-weight:700}
/* v0.6 Item 6 follow-up: drag-to-resize grip at the right edge of each TH. */
#vocabTable thead th .colGrip{position:absolute;top:0;right:0;bottom:0;width:6px;cursor:col-resize;user-select:none;z-index:2}
#vocabTable thead th .colGrip:hover{background:var(--gold);opacity:.5}
#vocabTable td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#vocabTable tbody tr:hover{background:var(--bg3)}
/* v0.6 Item 6: slug column de-emphasized and pushed to the far right. */
#vocabTable th.slugCol,#vocabTable td.slugCol{color:var(--text2);text-align:right;padding-right:14px;font:10px var(--mono);white-space:nowrap}
#vocabTable td.slugCol code{color:var(--text2);opacity:.7}
#vocabTable .tagActions{display:flex;gap:3px;flex-wrap:wrap}
#vocabTable .tagActions button{font-size:10px;padding:3px 6px;font-family:var(--mono)}
#vocabTable .btnAccept{background:var(--green);color:#111;font-weight:600}
#vocabTable .btnReject{background:#622;color:var(--red);border:1px solid var(--red)}
#vocabTable .propFlag{color:var(--gold);font-style:italic}

/* ============ MODAL ============ */
.modalBg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:800;align-items:center;justify-content:center}
.modalBg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--gold);border-radius:6px;padding:18px;min-width:380px;max-width:520px}
.modal h3{font:600 14px var(--mono);color:var(--gold);margin-bottom:12px;text-transform:uppercase}
.modal .row{margin-bottom:10px}
.modal .row label{display:block;font:10px var(--mono);color:var(--text2);text-transform:uppercase;margin-bottom:3px}
/* v0.6 Item 6: scope full-width to text-like inputs so checkboxes render at
   their natural size (prev rule made checkboxes stretch the modal width). */
.modal .row input[type="text"],.modal .row input:not([type]),.modal .row input[type="search"],.modal .row select,.modal .row textarea{width:100%}
/* v0.6 Item 6: left-aligned single-row checkbox rows — "[checkbox] label" with
   vertical centering. Used in Create Pill / Edit Pill dialogs. */
.modal .checkRow{display:flex;align-items:center;gap:8px;margin-bottom:10px;font:10px var(--mono);color:var(--text2);text-transform:uppercase;cursor:pointer;user-select:none}
.modal .checkRow input[type="checkbox"]{width:auto;margin:0;flex:0 0 auto;cursor:pointer}
.modal .checkRow span{flex:1}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal .actions button{padding:7px 14px;font-family:var(--mono);font-weight:600}
.modal .btnPrimary{background:var(--gold);color:#111}
.modal .btnDanger{background:#622;color:var(--red);border:1px solid var(--red)}

</style>
</head>
<body>

<div id="topBar">
  <span class="logo">MEDIAVAULT</span>
  <button class="tab-btn active" data-tab="inbox" onclick="switchTab('inbox')">INBOX</button>
  <button class="tab-btn" data-tab="vault" onclick="switchTab('vault')">THE VAULT</button>
  <button class="tab-btn" data-tab="vocab" onclick="switchTab('vocab')">TAG MANAGER</button>
  <span class="spacer"></span>
  <!-- v0.6 Item 6: Tag Manager actions — visible only when the vocab tab is
       active (toggled from switchTab). DELETE SELECTED / checkboxes removed
       per Mike — per-row DELETE is the only deletion path. -->
  <div class="tabActions" data-for="vocab">
    <input type="text" id="vocabSearch" placeholder="filter by slug..." oninput="vocabRender()">
    <button onclick="openTagCreateModal()">+ NEW TAG</button>
    <button onclick="openMergeModal()">&#8660; MERGE</button>
  </div>
  <!-- v0.6 Item 8: Vault controls — search + view toggle. Date/status/storage
       filters, sort dropdown, and tag-pill row were all removed per Mike.
       v0.6 Item 8d #3: selection-scoped action cluster (SCRAP/DEMOTE/
       RELEASE/ARCHIVE) lives in #vaultArtifactActions; populated by
       renderDetail when an artifact is selected, empty otherwise (and
       hidden via the :empty rule so it collapses cleanly). -->
  <div class="tabActions" data-for="vault">
    <input type="text" id="vSearch" placeholder="search vault..." oninput="vaultRenderSoon()">
    <button class="vbtn active" id="vBtnGrid" onclick="vaultSetView('grid')">GRID</button>
    <button class="vbtn"        id="vBtnTable" onclick="vaultSetView('table')">TABLE</button>
    <span class="cnt" id="vCount">0</span>
    <span id="vaultArtifactActions"></span>
  </div>
  <!-- v0.6 Item 7: inbox decision cluster lives here (right side of title bar)
       so the current artifact's commit button is always at the visual anchor
       of the page rather than floating in the right column. -->
  <div class="tabActions active" data-for="inbox">
    <button class="btnScrap"   onclick="inboxScrap()">&#10007; SCRAP</button>
    <button class="btnKeep"    onclick="inboxSave(false)">&#10003; SAVE TO VAULT</button>
    <button class="btnRelease" onclick="inboxSave(true)">&#9733; RELEASE</button>
  </div>
  <!-- v0.6 item 5: alert badge only shows when server health checks fail. -->
  <span id="srvAlert" class="alertBadge" title="Server unreachable" onclick="_srvHealthTick()"><span class="dot"></span>SERVER</span>
</div>

<div id="contentArea">

<!-- ============ INBOX ============ -->
<div id="inboxPane" class="tabPane active">
  <div id="inboxLeft">
    <div id="inboxNav">
      <button class="btnNav" onclick="inboxPrev()">&larr; PREV</button>
      <select id="inboxSelect" onchange="inboxSelectItem(this.value)"></select>
      <button class="btnNav" onclick="inboxNext()">NEXT &rarr;</button>
      <span class="prog" id="inboxProg">0 of 0</span>
    </div>
    <div id="inboxViewer">
      <div class="noMedia">Select a queue item to review</div>
    </div>
    <div id="inboxAiBar">
      <span class="aiDot" id="aiDot"></span>
      <button onclick="enrichCurrent()">ENRICH WITH AI</button>
      <span id="aiMsg" style="font:11px var(--mono);color:var(--text2)"></span>
    </div>
  </div>
  <div id="inboxRight">
    <!-- v0.6 Item 7: SCRAP / SAVE TO VAULT / RELEASE moved to the title bar.
         The "Pills" sectionHead was removed — the category blocks below are
         self-labelling. -->

    <!-- v0.5: Pill wall (grouped by category, 5-state) -->
    <!-- v0.6 Item 8d follow-up C3: pillAddWrap input removed. The pill wall
         already shows every vocab tag grouped by category — clicking toggles
         state. To create a new tag, use Tag Manager (top-level tab). This
         matches the vault detail UX, which has no add-pill input either. -->
    <div class="pillWall" id="pillWall"></div>

    <!-- v0.6 Item 8d follow-up #10: everything below pillAddWrap is wrapped
         in #inboxForm so the form fields have their own scroll region. This
         replaces the old position:sticky approach. -->
    <div id="inboxForm">
    <!-- v0.6 Item 8c: Mike wants Descriptions expanded by default (and any
         other collapsible sections in the flow). Keeping the <details> so the
         ▾ toggle still works for users who want to fold it up, but it now
         opens as soon as the inbox loads. -->
    <details class="sectionDetails" id="descDetails" open>
      <summary class="sectionHead" style="cursor:pointer;list-style:none">Descriptions ▾</summary>
    <!-- v0.5: ID is auto-assigned on save; removed visible field. -->
    <input type="hidden" id="fId">
    <div class="fieldGroup">
      <label>Short description</label>
      <input type="text" id="fShortDesc" placeholder="one line">
    </div>
    <div class="fieldGroup">
      <label>Long description</label>
      <textarea id="fLongDesc" placeholder="2-4 sentences"></textarea>
    </div>
    <div class="fieldGroup">
      <label>Extracted text</label>
      <textarea id="fExtractedText" placeholder="text extracted from media"></textarea>
    </div>
    <div class="fieldGroup">
      <label>Notes</label>
      <textarea id="fNotes"></textarea>
    </div>
    <!-- v0.5: Author moved to author:<slug> pill (add it in Pills above). -->
    <!-- v0.5: Parent artifact removed from inbox; attach via vault detail. -->
    <!-- v0.5: Old fAuthor and fParentId inputs replaced by hidden inputs to keep JS happy. -->
    <input type="hidden" id="fAuthor">
    <input type="hidden" id="fParentId">

    <div class="sectionHead">Source</div>
    <div class="fieldGroup">
      <label>Source URL</label>
      <!-- v0.6 Item 8d follow-up: explicit OPEN button so a stray click on
           the text input doesn't launch; user has to click the button. -->
      <div style="display:flex;gap:6px;align-items:stretch">
        <input type="text" id="fSourceUrl" placeholder="https://..." style="flex:1">
        <button type="button" id="fSourceUrlOpen" onclick="openInboxSourceUrl()" title="Open URL in new tab" style="padding:0 10px;font:11px var(--mono);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap">&#8599; Open</button>
      </div>
    </div>
    <div class="fieldGroup">
      <label>Source platform</label>
      <input type="text" id="fSourcePlatform" list="platformOptions" placeholder="facebook, reverbnation, etc.">
      <datalist id="platformOptions"></datalist>
    </div>

    <div class="sectionHead">Dates</div>
    <div class="fieldGroup row">
      <div>
        <label>Post date</label>
        <input type="date" id="fPostDate">
      </div>
      <div>
        <label>Capture date</label>
        <input type="date" id="fCaptureDate">
      </div>
    </div>
    <div class="fieldGroup">
      <label>Post date confidence</label>
      <div class="radioRow" id="fConfidenceRow">
        <label><input type="radio" name="confidence" value="extracted"><span>extracted</span></label>
        <label><input type="radio" name="confidence" value="manual"><span>manual</span></label>
        <label><input type="radio" name="confidence" value="estimated"><span>estimated</span></label>
        <label><input type="radio" name="confidence" value="unknown" checked><span>unknown</span></label>
      </div>
    </div>

    <div class="sectionHead">Storage</div>
    <div class="fieldGroup row">
      <div>
        <label>Storage mode</label>
        <select id="fStorageMode">
          <option value="vaulted">vaulted</option>
          <option value="referenced">referenced</option>
          <option value="url_only">url only</option>
        </select>
      </div>
      <div>
        <label>Media type</label>
        <input type="text" id="fMediaType" list="mediaTypeOptions" placeholder="photo, audio, ...">
        <datalist id="mediaTypeOptions"></datalist>
      </div>
    </div>

    </details><!-- /descDetails -->

    <!-- v0.5: Tag picker removed; pill wall above replaces it. Legacy tag-browse hidden for compat. -->
    <div class="tagPicker" id="tagPicker" style="display:none">
      <div class="appliedPills" id="appliedPills"></div>
      <div class="tagInput">
        <input type="text" id="tagInputBox" autocomplete="off">
        <div class="tagSuggest" id="tagSuggest"></div>
      </div>
      <div class="tagBrowse" id="tagBrowse"></div>
    </div>
    </div><!-- /inboxForm -->
  </div>
</div>

<!-- ============ VAULT ============ -->
<!-- v0.6 Item 8: vaultToolbar + vaultTagBar removed. Search + view toggle live
     in #topBar .tabActions[data-for="vault"]. Date filters, status filter,
     storage filter, sort dropdown, "Show children inline" checkbox, and the
     tag-pill chip row were all dropped per Mike — search bar covers their use
     cases and the per-column header click handles sort. -->
<div id="vaultPane" class="tabPane">
  <div id="vaultBody">
    <div id="vaultContent">
      <div id="vaultGrid"></div>
      <div id="vaultTable">
        <table>
          <colgroup>
            <col class="cvDate">
            <col class="cvPlatform">
            <col class="cvShort">
            <col class="cvStatus">
            <col class="cvStorage">
          </colgroup>
          <thead><tr>
            <th data-sort="post_date">Date</th>
            <th data-sort="source_platform">Platform</th>
            <th data-sort="description_short">Short Description</th>
            <th data-sort="status">Status</th>
            <th data-sort="storage_mode">Storage</th>
          </tr></thead>
          <tbody id="vaultTableBody"></tbody>
        </table>
      </div>
    </div>
    <div id="vaultDetailGrip" title="Drag to resize"></div>
    <div id="vaultDetail"></div>
  </div>
</div>

<!-- ============ VOCAB ============ -->
<div id="vocabPane" class="tabPane">
  <!-- v0.6 Item 6: toolbar row removed; search / + NEW TAG / ⇔ MERGE /
       × DELETE SELECTED now live in the title bar (see #topBar .tabActions). -->
  <div id="vocabBody">
    <!-- v0.6 Item 8d follow-up C4: Status column + ACCEPT/REJECT actions
         removed. The "proposed" tag concept is dead — every tag is just a
         tag now. Pill-add UI requires a category, so there's no path that
         creates a proposed row anymore. -->
    <table id="vocabTable">
      <colgroup>
        <col class="cUsage">
        <col class="cCategory">
        <col class="cDisplay">
        <col class="cActions">
        <col class="cSlug">
      </colgroup>
      <thead><tr>
        <th class="sortable" data-sort="usage"        onclick="vocabSortClick('usage')">Usage<span class="sortInd"></span></th>
        <th class="sortable" data-sort="category"     onclick="vocabSortClick('category')">Category<span class="sortInd"></span></th>
        <th class="sortable" data-sort="display_name" onclick="vocabSortClick('display_name')">Display name<span class="sortInd"></span></th>
        <th>Actions</th>
        <th class="slugCol sortable" data-sort="slug" onclick="vocabSortClick('slug')">Slug<span class="sortInd"></span></th>
      </tr></thead>
      <tbody id="vocabBodyRows"></tbody>
    </table>
  </div>
</div>

</div><!-- /contentArea -->

<!-- Modals -->
<div class="modalBg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Renderer for non-image artifacts (DOM observer) -->
<script src="/ext/hr_manager_renderer.js"></script>

<script>
// ==================== GLOBAL STATE ====================
const API_BASE = '';
let SQL = null;      // sql.js module
let DB = null;       // loaded db
let QUEUE = [];      // inbox queue rows
let ARTIFACTS = [];  // full artifact list
let TAGS_BY_SLUG = {}; // tag vocab map
let TAG_LIST = [];   // tag vocab list (ordered)
let INBOX_IDX = -1;  // currently-selected queue idx
let CURRENT_ARTIFACT_ID = null;  // currently-selected in vault
let EDITING_ID = null; // artifact id being edited in vault (separate from viewing)
let FILTER_TAG_STATE = {}; // slug -> 'must' | 'mustnot' | undefined
let VAULT_VIEW = 'grid';

// ==================== UTILITIES ====================
function toast(msg, kind='ok'){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function fmtDate(d){ if(!d) return ''; return String(d).slice(0,10); }
function titleCase(s){ return s.split(/[_\s]/).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '); }
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function parseTagsJson(s){
  if(!s) return [];
  try{ const a = JSON.parse(s); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function slugify(s){
  // v0.5: allow optional namespace prefix `<ns>:<slug>` (e.g. author:carsie_blanton)
  if(s===null||s===undefined) return '';
  let str = String(s).trim().toLowerCase();
  if(!str) return '';
  let prefix = '';
  if(str.includes(':')){
    const idx = str.indexOf(':');
    let head = str.slice(0,idx).replace(/[-\s]+/g,'_').replace(/[^a-z0-9_]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
    if(head){ prefix = head + ':'; str = str.slice(idx+1); }
    else { str = str.slice(idx+1); }
  }
  let body = str.replace(/[-\/\\\s]+/g,'_').replace(/[^a-z0-9_]/g,'').replace(/_+/g,'_').replace(/^_|_$/g,'');
  if(!body) return '';
  const full = prefix + body;
  if(full.length > 64) return '';
  return full;
}
async function api(path, body){
  const opts = {method: body ? 'POST' : 'GET', headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if(!r.ok){ const t = await r.text(); throw new Error(`${path} ${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}

// ==================== TAB SWITCHING ====================
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===name);
  });
  document.querySelectorAll('.tabPane').forEach(p=>p.classList.remove('active'));
  const pane = document.getElementById(name+'Pane');
  if(pane) pane.classList.add('active');
  // v0.6 Item 6: toggle the title-bar action cluster for the active tab.
  document.querySelectorAll('#topBar .tabActions').forEach(el => {
    el.classList.toggle('active', el.dataset.for === name);
  });
  if(name==='vault'){
    vaultRender();
    // v0.6 Item 8d follow-up #8: if the user lands on the Vault tab with no
    // artifact selected (fresh load) or a stale selection that's been filtered
    // out, auto-pick the first visible row. Without this the tab opens with
    // the "Select an artifact..." empty-state placeholder on every refresh,
    // which felt broken.
    if(!CURRENT_ARTIFACT_ID || !VAULT_VISIBLE_IDS.includes(CURRENT_ARTIFACT_ID)){
      if(VAULT_VISIBLE_IDS.length){
        CURRENT_ARTIFACT_ID = VAULT_VISIBLE_IDS[0];
        renderDetail(CURRENT_ARTIFACT_ID);
      }
    }
  }
  if(name==='vocab'){ vocabRender(); }
  if(name==='inbox' && INBOX_IDX<0 && QUEUE.length){ inboxSelectItem(QUEUE[0].queue_id); }
}

// ==================== DATA LOAD ====================
async function loadDb(){
  const buf = await fetch('/db?_=' + Date.now()).then(r=>r.arrayBuffer());
  DB = new SQL.Database(new Uint8Array(buf));
  refreshArtifactsFromDb();
}
function refreshArtifactsFromDb(){
  ARTIFACTS = [];
  try{
    const res = DB.exec(`SELECT * FROM artifacts ORDER BY post_date DESC, id ASC`);
    if(!res.length){ return; }
    const cols = res[0].columns;
    ARTIFACTS = res[0].values.map(row => {
      const o = {};
      cols.forEach((c,i)=> o[c] = row[i]);
      o._tags = parseTagsJson(o.tags);
      return o;
    });
  }catch(e){ console.error('refresh artifacts', e); }
}
async function loadQueue(){
  const r = await api('/api/queue');
  // v0.6 Item 8c: bug fix — scrapped inbox items were re-appearing because
  // /api/queue (no status filter) returns ALL queue rows (pending, enriched,
  // approved, keep, skip, failed). inboxScrap sets status='skip' but the row
  // must stay in the DB so the ingest scan won't re-queue the same file —
  // so the fix is a client-side filter: only show 'pending' + 'enriched',
  // the two in-flight inbox states.
  const ACTIVE = new Set(['pending','enriched']);
  QUEUE = (r.rows || []).filter(row => ACTIVE.has(row.status));
  populateInboxSelect();
  if(QUEUE.length && INBOX_IDX<0){ inboxSelectItem(QUEUE[0].queue_id); }
  else if(!QUEUE.length){
    INBOX_IDX = -1;
    const prog = document.getElementById('inboxProg'); if(prog) prog.textContent = '0 of 0';
    const viewer = document.getElementById('inboxViewer'); if(viewer) viewer.innerHTML = '<div class="noMedia">Queue empty</div>';
    clearInboxRight();
  }
}
async function loadTags(){
  const r = await api('/api/tags');
  TAG_LIST = r.rows || [];
  TAGS_BY_SLUG = {};
  TAG_LIST.forEach(t => TAGS_BY_SLUG[t.slug] = t);
  renderTagBrowse();
  // v0.6 Item 8: renderVaultTagBar() removed — the tag-pill filter row above
  // the vault table was dropped per Mike. Search covers the same use cases.
  populateMediaTypeOptions();
  populatePlatformOptions();
}

// ==================== INBOX ====================
function populateInboxSelect(){
  const sel = document.getElementById('inboxSelect');
  sel.innerHTML = QUEUE.map(q => {
    const label = (q.raw_path || q.source_url || 'queue-'+q.queue_id).split(/[\\\/]/).pop().slice(0,60);
    return `<option value="${q.queue_id}">${esc(label)} [#${q.queue_id}]</option>`;
  }).join('');
}
function inboxSelectItem(queueId){
  queueId = parseInt(queueId,10);
  INBOX_IDX = QUEUE.findIndex(q => q.queue_id===queueId);
  if(INBOX_IDX<0) return;
  const q = QUEUE[INBOX_IDX];
  document.getElementById('inboxSelect').value = queueId;
  document.getElementById('inboxProg').textContent = `${INBOX_IDX+1} of ${QUEUE.length}`;
  renderInboxViewer(q);
  populateInboxFields(q);
}

// v0.6 Item 8d follow-up: when the queue empties (last item scrapped,
// saved, or released), the right-side panel used to keep showing the last
// artifact's pills, form fields, and accumulated view. Wipe the whole
// thing — no artifact selected means nothing to show.
function clearInboxRight(){
  CURRENT_PILL_STATES = {};
  OPERATOR_TOUCHED_SLUGS = new Set();
  CURRENT_WARNINGS = [];
  const pillWall = document.getElementById('pillWall');
  if(pillWall) pillWall.innerHTML = '';
  // Clear every form input under #inboxForm
  const form = document.getElementById('inboxForm');
  if(form){
    form.querySelectorAll('input[type="text"], textarea, input[type="date"]').forEach(el => { el.value = ''; });
    form.querySelectorAll('input[type="radio"]').forEach(el => { el.checked = false; });
    const fId = document.getElementById('fId'); if(fId) fId.value = '';
  }
  // Drop field-warning glow
  document.querySelectorAll('.fieldGroup.warn').forEach(el => { el.classList.remove('warn'); el.title = ''; });
}
function renderInboxViewer(q){
  const v = document.getElementById('inboxViewer');
  v.innerHTML = '';
  if(q.raw_path){
    // Let the renderer handle non-image assets via attribute upgrade
    const img = document.createElement('img');
    img.src = '/image-raw?path=' + encodeURIComponent(q.raw_path);
    img.setAttribute('data-asset-path', q.raw_path);
    img.onerror = function(){
      // Fallback: mount via /asset-raw DOM that the renderer picks up
      v.innerHTML = `<img src="/asset-raw?path=${encodeURIComponent(q.raw_path)}" data-asset-path="${esc(q.raw_path)}" style="max-width:100%;max-height:100%">`;
    };
    v.appendChild(img);
  } else if(q.source_url){
    v.innerHTML = `<div class="noMedia">URL only<br><a href="${esc(q.source_url)}" target="_blank" style="color:var(--gold)">${esc(q.source_url)}</a></div>`;
  } else {
    v.innerHTML = `<div class="noMedia">No media for queue item #${q.queue_id}</div>`;
  }
}
function populateInboxFields(q){
  // Try parse enrichment_json for pre-fill
  let enr = {};
  try{ enr = q.enrichment_json ? JSON.parse(q.enrichment_json) : {}; }catch(e){}
  // v0.6 Item 8d follow-up: a re-queued item (ingest_source='requeue') has no
  // enrichment_json — the content lives on the existing artifact row. Prefer
  // that as the pre-fill source so the user doesn't re-enter the descriptions
  // they already approved. For fresh queue items (no artifact_id), the
  // artifact lookup returns undefined and we fall back to enrichment_json as
  // before.
  const art = q.artifact_id ? (ARTIFACTS || []).find(a => a.id === q.artifact_id) : null;
  const pickArt = (k) => (art && art[k] != null && art[k] !== '') ? art[k] : undefined;
  const enrOrArt = (k) => { const v = pickArt(k); return v !== undefined ? v : (enr[k] || ''); };
  document.getElementById('fId').value = q.artifact_id || '';
  document.getElementById('fShortDesc').value = enrOrArt('description_short');
  document.getElementById('fLongDesc').value  = enrOrArt('description_long');
  document.getElementById('fExtractedText').value = enrOrArt('extracted_text');
  document.getElementById('fNotes').value = enrOrArt('notes');
  document.getElementById('fSourceUrl').value = pickArt('source_url') || q.source_url || enr.source_url || '';
  document.getElementById('fSourcePlatform').value = enrOrArt('source_platform');
  document.getElementById('fPostDate').value = fmtDate(pickArt('post_date') || enr.post_date);
  document.getElementById('fCaptureDate').value = fmtDate(pickArt('capture_date') || enr.capture_date);
  const conf = pickArt('post_date_confidence') || enr.post_date_confidence || 'unknown';
  document.querySelectorAll('#fConfidenceRow input[type=radio]').forEach(r=>{ r.checked = r.value===conf; });
  document.getElementById('fStorageMode').value = pickArt('storage_mode') || enr.storage_mode || (q.raw_path ? 'vaulted' : (q.source_url ? 'url_only' : 'vaulted'));
  document.getElementById('fMediaType').value = enrOrArt('media_type');

  // v0.5: pill_states is the canonical shape. Backward-compat: tags / tags_known / tags_proposed.
  // v0.6 Item 8d follow-up: for a re-queued artifact, seed the pill states
  // from the artifact's persisted tags (all on_confident) so the user sees
  // the tags they already curated instead of an empty pill wall.
  // pill-redesign 2026-05-24 §7: artifact-open resets operator-touched set
  // AND scrubs any stale 'neutral' entries (those only persist within a
  // single artifact session — see §2 "on next artifact open, gone from APPLIED").
  CURRENT_PILL_STATES = {};
  OPERATOR_TOUCHED_SLUGS = new Set();
  if(art && Array.isArray(art._tags)){
    for(const slug of art._tags){
      const s = slugify(slug);
      if(s) CURRENT_PILL_STATES[s] = 'on';
    }
  } else if(enr.pill_states && typeof enr.pill_states === 'object'){
    for(const [slug, state] of Object.entries(enr.pill_states)){
      if(!slug) continue;
      const s = slugify(slug);
      if(!s) continue;
      // Normalize legacy states. 'on_confident' + 'on_uncertain' → 'on'.
      // 'off_suspected' + 'off_maybe' → drop (= never-applied). 'neutral'
      // is dropped here too: it should not have been persisted, but be
      // defensive (older saves predating the save-side filter).
      if(state === 'on_confident' || state === 'on_uncertain' || state === 'on'){
        CURRENT_PILL_STATES[s] = 'on';
      } else if(state === 'exclude'){
        CURRENT_PILL_STATES[s] = 'exclude';
      }
      // else: legacy off_* or unknown — drop entirely.
    }
  } else {
    // v0.4 compat — known + proposed both load as 'on' (operator-touched
    // tracker enforces the save gate).
    if(Array.isArray(enr.tags)){
      for(const slug of enr.tags){ const s = slugify(slug); if(s) CURRENT_PILL_STATES[s] = 'on'; }
    }
    if(Array.isArray(enr.tags_known)){
      for(const slug of enr.tags_known){ const s = slugify(slug); if(s) CURRENT_PILL_STATES[s] = 'on'; }
    }
    if(Array.isArray(enr.tags_proposed)){
      for(const slug of enr.tags_proposed){ const s = slugify(slug); if(s && !CURRENT_PILL_STATES[s]) CURRENT_PILL_STATES[s] = 'on'; }
    }
    // v0.4 author_name → synthesize an author:<slug> 'on' pill
    if(enr.author_name){
      const aslug = slugify('author:' + enr.author_name);
      if(aslug && !CURRENT_PILL_STATES[aslug]) CURRENT_PILL_STATES[aslug] = 'on';
    }
  }
  // Derived list of currently-on slugs (compat with old code paths).
  CURRENT_APPLIED_TAGS = Object.entries(CURRENT_PILL_STATES)
    .filter(([_, st]) => st === 'on')
    .map(([s]) => s);

  // Compute warnings from current artifact + pill states (R1-R5, JS port of attention_rules.py)
  CURRENT_WARNINGS = computeWarnings();
  renderPillWall();
  renderAppliedPills();
  renderTagBrowse();
}
function inboxPrev(){
  if(INBOX_IDX<=0) return;
  inboxSelectItem(QUEUE[INBOX_IDX-1].queue_id);
}
function inboxNext(){
  if(INBOX_IDX>=QUEUE.length-1) return;
  inboxSelectItem(QUEUE[INBOX_IDX+1].queue_id);
}
async function inboxScrap(){
  if(INBOX_IDX<0) return;
  const q = QUEUE[INBOX_IDX];
  if(!confirm(`Scrap queue item #${q.queue_id}?`)) return;
  try{
    // v0.6 Item 8c: server-side mark as 'skip' so ingest scan won't re-queue
    // the same raw file; client-side loadQueue() filters 'skip' out of the
    // active queue so the row actually disappears from the UI.
    await api('/api/queue-update', {queue_id: q.queue_id, status: 'skip'});
    const nextTarget = QUEUE[INBOX_IDX+1] || QUEUE[INBOX_IDX-1] || null;
    INBOX_IDX = -1;
    await loadQueue();
    if(nextTarget){
      const stillThere = QUEUE.find(r => r.queue_id === nextTarget.queue_id);
      if(stillThere) inboxSelectItem(stillThere.queue_id);
      else if(QUEUE.length) inboxSelectItem(QUEUE[0].queue_id);
    }
    toast('Scrapped', 'ok');
  }catch(e){ toast('Scrap failed: '+e.message,'err'); }
}
// v0.6 Item 8d follow-up: explicit OPEN button for the inbox Source URL
// field. Reads the current value (not the queue item's stored value) so the
// user can paste/edit and launch without saving first.
function openInboxSourceUrl(){
  const el = document.getElementById('fSourceUrl');
  const url = el ? (el.value || '').trim() : '';
  if(!url){ toast('No source URL','err'); return; }
  if(!/^https?:\/\//i.test(url)){ toast('URL must start with http:// or https://','err'); return; }
  window.open(url, '_blank', 'noopener');
}
async function inboxSave(release){
  if(INBOX_IDX<0){ toast('No item selected','err'); return; }
  const q = QUEUE[INBOX_IDX];
  let id = document.getElementById('fId').value.trim();
  if(!id){
    const r = await api('/api/next-id', {});
    id = r.id;
  }
  // v0.5: derive applied tags from pill_states (on_confident | on_uncertain count as applied).
  syncAppliedFromStates();
  // v0.6 Item 8d C5 / pill-redesign 2026-05-24 §7: gate save-to-vault.
  // Decomposed into two checks:
  //   (1) at least one pill must currently be 'on' (anything was applied)
  //   (2) operator must have physically clicked at least one pill this
  //       session (AI proposals alone don't approve themselves — discipline
  //       preserved across the state-model collapse).
  const anyOn = Object.values(CURRENT_PILL_STATES).some(s => s === 'on');
  if(!anyOn){
    toast('Save blocked: needs at least 1 applied tag','err');
    return;
  }
  if(OPERATOR_TOUCHED_SLUGS.size === 0){
    toast('Save blocked: confirm tags — click at least one pill','err');
    return;
  }
  const _warn = computeWarnings();
  const _missingCat = _warn.filter(w => w.startsWith('missing_category:')).map(w => w.split(':')[1]);
  if(_missingCat.length){
    toast('Save blocked: missing required category ('+_missingCat.join(', ')+')','err');
    return;
  }
  const fields = {
    source_url: document.getElementById('fSourceUrl').value || null,
    source_platform: document.getElementById('fSourcePlatform').value || null,
    ingest_source: q.ingest_source || 'inbox',
    ingest_date: new Date().toISOString().slice(0,10),
    storage_mode: document.getElementById('fStorageMode').value,
    local_asset_path: q.raw_path || null,
    media_type: document.getElementById('fMediaType').value || null,
    post_date: document.getElementById('fPostDate').value || null,
    post_date_confidence: document.querySelector('#fConfidenceRow input[type=radio]:checked')?.value || 'unknown',
    capture_date: document.getElementById('fCaptureDate').value || null,
    description_short: document.getElementById('fShortDesc').value || null,
    description_long: document.getElementById('fLongDesc').value || null,
    extracted_text: document.getElementById('fExtractedText').value || null,
    tags: CURRENT_APPLIED_TAGS,
    // pill-redesign 2026-05-24 §2: 'neutral' entries are session-only
    // (visible-but-muted in APPLIED until next open). Don't persist them.
    pill_states: Object.fromEntries(Object.entries(CURRENT_PILL_STATES).filter(([_, st]) => st === 'on' || st === 'exclude')),
    notes: document.getElementById('fNotes').value || null
  };
  try{
    await api('/api/artifact-save', {
      queue_id: q.queue_id,
      id: id,
      fields: fields,
      raw_path: q.raw_path || null,
      release_immediately: !!release
    });
    toast(`Saved ${id}${release?' (released)':''}`,'ok');
    // Remove from queue list
    QUEUE.splice(INBOX_IDX,1);
    populateInboxSelect();
    await loadDb();
    await loadTags();
    if(QUEUE.length){ inboxSelectItem(QUEUE[Math.min(INBOX_IDX,QUEUE.length-1)].queue_id); }
    else { INBOX_IDX=-1; document.getElementById('inboxProg').textContent='0 of 0'; document.getElementById('inboxViewer').innerHTML='<div class="noMedia">Queue empty</div>'; clearInboxRight(); }
  }catch(e){ toast('Save failed: '+e.message,'err'); }
}

async function enrichCurrent(){
  if(INBOX_IDX<0) return;
  const q = QUEUE[INBOX_IDX];
  const dot = document.getElementById('aiDot');
